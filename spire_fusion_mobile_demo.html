<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>尖塔融合手機 Demo｜竪版美術預留 + 解說</title>
  <style>
    :root {
      --bg: #0f121b;
      --panel: #1a2031;
      --panel2: #242d45;
      --line: #354264;
      --text: #ecf1ff;
      --muted: #9aa8d1;
      --good: #72e8a4;
      --bad: #ff8f8f;
      --warn: #ffd285;
      --accent: #8ea8ff;
      --enemy: #ff9b7a;
      --player: #8fd1ff;
      --shadow: 0 10px 24px rgba(0, 0, 0, 0.32);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at 50% -20%, #283458 0%, var(--bg) 58%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", sans-serif;
      padding: 10px 10px 16px;
    }

    .app {
      max-width: 430px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .title {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 0.3px;
    }

    .sub {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      margin-top: 2px;
    }

    .panel {
      background: linear-gradient(180deg, var(--panel2), var(--panel));
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px;
      box-shadow: var(--shadow);
    }

    /* === 美术舞台：为将来的立绘/特效预留可见空间 === */
    .stage {
      position: relative;
      border-radius: 16px;
      padding: 10px 10px 12px;
      border: 1px solid #2f3a59;
      overflow: hidden;
      background:
        radial-gradient(120% 60% at 50% 0%, rgba(80, 60, 40, 0.35) 0%, rgba(18, 22, 36, 0) 55%),
        linear-gradient(180deg, #151b2e 0%, #101726 60%, #0e1421 100%);
    }

    .stage-bg {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(180deg, rgba(255, 200, 160, 0.08) 0%, rgba(0, 0, 0, 0) 35%),
        radial-gradient(50% 30% at 50% 90%, rgba(160, 200, 255, 0.08) 0%, rgba(0, 0, 0, 0) 60%);
    }

    .stage-slot {
      position: relative;
      border: 1px dashed rgba(255, 255, 255, 0.14);
      border-radius: 14px;
      background: rgba(10, 14, 24, 0.3);
      backdrop-filter: blur(1px);
      min-height: 180px;
      margin-bottom: 10px;
      padding: 10px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      cursor: pointer;
      transition: border-color 150ms ease, box-shadow 150ms ease, transform 120ms ease;
    }

    .stage-slot.player-slot { min-height: 170px; }

    .stage-slot.drop-ready {
      border-color: #f7d39b;
      box-shadow: 0 0 0 2px rgba(247, 211, 155, 0.28);
      transform: scale(1.005);
    }

    .art-placeholder {
      position: absolute;
      inset: 10px;
      border-radius: 12px;
      background:
        radial-gradient(60% 50% at 50% 60%, rgba(255, 255, 255, 0.05) 0%, rgba(0, 0, 0, 0) 65%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: rgba(255, 255, 255, 0.42);
      font-size: 11px;
      pointer-events: none;
    }

    .art-glyph {
      font-size: 64px;
      line-height: 1;
      filter: drop-shadow(0 6px 14px rgba(0, 0, 0, 0.55));
    }

    .enemy-slot .art-glyph { color: var(--enemy); }
    .player-slot .art-glyph { color: var(--player); }

    .art-placeholder .hint {
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 999px;
      padding: 2px 8px;
      background: rgba(0, 0, 0, 0.28);
      letter-spacing: 0.4px;
    }

    /* === 角色顶部信息条（覆盖在舞台上）=== */
    .unit-strip {
      position: absolute;
      left: 12px;
      right: 12px;
      top: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      pointer-events: none;
    }

    .player-slot .unit-strip {
      top: auto;
      bottom: 10px;
    }

    .unit-name {
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.3px;
      text-shadow: 0 2px 6px rgba(0, 0, 0, 0.55);
    }

    .unit-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .chip {
      font-size: 10px;
      font-weight: 700;
      padding: 3px 7px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.28);
      background: rgba(0, 0, 0, 0.4);
      color: #ffe9c8;
    }

    .chip.hp { color: #ffd5d5; }
    .chip.block { color: #bfe6ff; }
    .chip.charge { color: #ffd285; border-color: rgba(255, 210, 133, 0.6); }
    .chip.stun { color: #d6b7ff; border-color: rgba(214, 183, 255, 0.55); }
    .chip.pos { color: #cfdeff; }

    .bar {
      width: 100%;
      height: 7px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.5);
      overflow: hidden;
      margin-top: 6px;
    }

    .bar > i {
      display: block;
      height: 100%;
      width: 0;
      transition: width 180ms ease;
      border-radius: 999px;
    }

    .enemy-slot .bar > i { background: linear-gradient(90deg, #f97878, #ffb089); }
    .player-slot .bar > i { background: linear-gradient(90deg, #6fb4ff, #96e0ff); }

    /* === 意图条：在敌我之间单独一行，像游戏里的 intent 气泡 === */
    .intent-bubble {
      margin: 0 auto 10px;
      max-width: 100%;
      border-radius: 12px;
      padding: 8px 10px;
      background: linear-gradient(180deg, rgba(120, 80, 60, 0.4), rgba(50, 34, 30, 0.5));
      border: 1px solid rgba(255, 200, 140, 0.35);
      color: #ffe6c7;
      font-size: 12px;
      line-height: 1.4;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.45);
    }

    .intent-bubble strong { color: #ffd28f; }

    .intent-bubble button {
      border: 1px solid rgba(255, 255, 255, 0.28);
      background: rgba(0, 0, 0, 0.3);
      color: #ffe9c8;
      border-radius: 8px;
      font-size: 11px;
      padding: 4px 8px;
    }

    .stage-footer {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
    }

    .resource {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .resource .item {
      border-radius: 10px;
      padding: 7px 8px;
      border: 1px solid #38466d;
      background: #12192b;
      text-align: center;
      font-size: 11px;
      line-height: 1.35;
    }

    .item strong {
      font-size: 15px;
      display: block;
      margin-top: 1px;
      color: #f1f4ff;
    }

    .drop-hint {
      margin-top: 8px;
      border-radius: 10px;
      padding: 8px;
      border: 1px dashed #5468a0;
      color: #c8d4ff;
      font-size: 12px;
      text-align: center;
      background: rgba(30, 40, 68, 0.55);
      min-height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .drop-hint.hot {
      border-color: #f7d39b;
      color: #ffe6bd;
      background: rgba(88, 58, 38, 0.38);
    }

    /* === 手牌 === */
    .hand-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 12px;
      color: var(--muted);
    }

    .hand-scroll {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      scroll-snap-type: x proximity;
    }

    .hand-scroll::-webkit-scrollbar { height: 6px; }
    .hand-scroll::-webkit-scrollbar-thumb {
      background: #3a4771;
      border-radius: 999px;
    }

    .card {
      flex: 0 0 138px;
      min-height: 162px;
      border-radius: 12px;
      border: 1px solid #47588d;
      background: linear-gradient(180deg, #2a3661, #1a2341);
      color: #eef2ff;
      padding: 10px;
      position: relative;
      text-align: left;
      scroll-snap-align: start;
      touch-action: none;
      transition: transform 120ms ease, box-shadow 120ms ease, opacity 120ms ease;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.24);
    }

    .card.dragging { opacity: 0.4; transform: scale(0.98); }
    .card.disabled {
      opacity: 0.45;
      filter: grayscale(0.28);
      border-color: #56628f;
    }

    .cost {
      position: absolute;
      right: 8px;
      top: 8px;
      width: 24px;
      height: 24px;
      border-radius: 999px;
      background: #ffd67c;
      color: #3e2d00;
      display: grid;
      place-items: center;
      font-size: 12px;
      font-weight: 900;
      border: 1px solid #ffe9b8;
    }

    .tag {
      display: inline-block;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 10px;
      font-weight: 700;
      border: 1px solid #5f73b0;
      color: #ced8ff;
      background: #23305a;
      margin-bottom: 7px;
    }

    .name {
      font-size: 15px;
      font-weight: 800;
      margin-right: 30px;
    }

    .desc {
      margin-top: 6px;
      font-size: 12px;
      line-height: 1.42;
      color: #d4ddff;
    }

    .drag-note {
      margin-top: 8px;
      font-size: 11px;
      color: #aebbe3;
      border-top: 1px dashed rgba(255, 255, 255, 0.18);
      padding-top: 6px;
    }

    .btns {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .btn {
      flex: 1;
      border-radius: 10px;
      border: 1px solid #4e5f96;
      background: #1f2a4a;
      color: #e8edff;
      padding: 10px;
      font-weight: 700;
      font-size: 14px;
    }

    .btn.primary {
      background: #30458f;
      border-color: #6d86e0;
    }

    .log {
      border: 1px solid #36415f;
      background: #111726;
      border-radius: 10px;
      padding: 8px;
      max-height: 132px;
      overflow: auto;
      font-size: 12px;
      line-height: 1.45;
      color: #dbe4ff;
      white-space: pre-line;
    }

    .win { color: #96ffc2; font-weight: 700; }
    .lose { color: #ff9d9d; font-weight: 700; }

    .drag-ghost {
      position: fixed;
      z-index: 999;
      width: 138px;
      min-height: 162px;
      border-radius: 12px;
      border: 1px solid #ffe2ad;
      background: linear-gradient(180deg, #435ba4, #253261);
      color: #fff6e3;
      pointer-events: none;
      padding: 10px;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.4);
      transform: translate(-50%, -50%) scale(1.04);
    }

    .drag-ghost .cost {
      background: #ffe2ad;
      border-color: #fff1cf;
    }

    /* === 解说弹层 === */
    .sheet-mask {
      position: fixed;
      inset: 0;
      background: rgba(5, 8, 16, 0.62);
      z-index: 40;
      display: none;
      align-items: flex-end;
      justify-content: center;
    }

    .sheet-mask.show { display: flex; }

    .sheet {
      width: 100%;
      max-width: 430px;
      background: linear-gradient(180deg, #242e4a, #181e30);
      border: 1px solid #3d4b76;
      border-bottom: 0;
      border-radius: 18px 18px 0 0;
      padding: 14px 14px 18px;
      box-shadow: 0 -18px 40px rgba(0, 0, 0, 0.45);
      animation: sheetIn 180ms ease;
    }

    @keyframes sheetIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .sheet-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .sheet-title {
      font-size: 16px;
      font-weight: 800;
    }

    .sheet-close {
      border: 1px solid #4e5f96;
      background: transparent;
      color: #dde4ff;
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 12px;
    }

    .sheet-row {
      display: grid;
      grid-template-columns: 64px 1fr;
      gap: 10px;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px dashed rgba(255, 255, 255, 0.14);
    }

    .sheet-row:last-child { border-bottom: 0; }

    .sheet-row .avatar {
      width: 64px;
      height: 64px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      font-size: 32px;
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.18);
    }

    .sheet-row.enemy .avatar { color: var(--enemy); }
    .sheet-row.player .avatar { color: var(--player); }

    .sheet-meta {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    .sheet-body {
      margin-top: 10px;
      font-size: 13px;
      color: #dde5ff;
      line-height: 1.55;
    }

    .sheet-section {
      margin-top: 10px;
      border: 1px solid #3a4770;
      border-radius: 10px;
      background: #111629;
      padding: 9px 10px;
    }

    .sheet-section h4 {
      margin: 0 0 6px;
      font-size: 12px;
      color: var(--accent);
      letter-spacing: 0.4px;
    }

    .sheet-section ul {
      margin: 0;
      padding-left: 16px;
    }

    .sheet-section li { margin-bottom: 3px; }

    .status-line {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    .status-line .tag-s {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: rgba(255, 255, 255, 0.06);
      color: #e5ecff;
    }
  </style>
</head>
<body>
  <div class="app">
    <div>
      <div class="title">尖塔融合手機 Demo（竪版）</div>
      <div class="sub">美術舞台已預留｜點擊角色查看解說｜手牌拖到目標出牌</div>
    </div>

    <div class="panel">
      <div class="stage">
        <div class="stage-bg"></div>

        <div class="stage-slot enemy-slot" id="enemyDrop" data-who="enemy">
          <div class="art-placeholder">
            <div class="art-glyph">👹</div>
            <div class="hint">敵人美術預留區</div>
          </div>
          <div class="unit-strip">
            <div>
              <div class="unit-name" id="enemyName">斷罪騎士</div>
              <div class="bar" style="width:180px"><i id="enemyHpBar"></i></div>
            </div>
            <div class="unit-tags" id="enemyTags"></div>
          </div>
        </div>

        <div class="intent-bubble">
          <div id="intentBox">敵人意圖：-</div>
          <button id="intentDetailBtn">詳情</button>
        </div>

        <div class="stage-slot player-slot" id="playerDrop" data-who="player">
          <div class="art-placeholder">
            <div class="art-glyph">🛡️</div>
            <div class="hint">玩家美術預留區</div>
          </div>
          <div class="unit-strip">
            <div>
              <div class="unit-name" id="playerName">你</div>
              <div class="bar" style="width:180px"><i id="playerHpBar"></i></div>
            </div>
            <div class="unit-tags" id="playerTags"></div>
          </div>
        </div>

        <div class="stage-footer">
          <span id="turnBadge">第 1 回合</span>
          <span id="posBadge">前排</span>
        </div>
      </div>

      <div class="resource" style="margin-top:10px;">
        <div class="item">能量<strong id="energyVal">3</strong></div>
        <div class="item">手牌<strong id="handCount">0</strong></div>
        <div class="item">牌庫<strong id="deckCount">0</strong></div>
      </div>

      <div class="drop-hint" id="dropHint">拖牌到「敵人」或「自己」角色區來出牌，點角色可看解說</div>
    </div>

    <div class="panel">
      <div class="hand-title">
        <span>手牌區（長按拖動）</span>
        <span id="handTips">可拖拽出牌</span>
      </div>
      <div class="hand-scroll" id="hand"></div>

      <div class="btns">
        <button class="btn primary" id="endTurnBtn">結束回合</button>
        <button class="btn" id="restartBtn">重開本關</button>
      </div>
    </div>

    <div class="panel">
      <div class="log" id="log"></div>
    </div>
  </div>

  <!-- 解说弹层 -->
  <div class="sheet-mask" id="sheetMask">
    <div class="sheet" id="sheet">
      <div class="sheet-head">
        <div class="sheet-title" id="sheetTitle">角色解說</div>
        <button class="sheet-close" id="sheetClose">關閉</button>
      </div>
      <div class="sheet-row" id="sheetRow">
        <div class="avatar" id="sheetAvatar">👤</div>
        <div>
          <div id="sheetName" style="font-weight:800;">—</div>
          <div class="sheet-meta" id="sheetMeta"></div>
        </div>
      </div>
      <div class="sheet-body" id="sheetBody"></div>
      <div class="sheet-section" id="sheetIntentSec" style="display:none;">
        <h4>本回合意圖解讀</h4>
        <div id="sheetIntent"></div>
      </div>
      <div class="sheet-section">
        <h4>當前狀態</h4>
        <div class="status-line" id="sheetStatus"></div>
      </div>
      <div class="sheet-section" id="sheetTipsSec">
        <h4>應對建議</h4>
        <ul id="sheetTips"></ul>
      </div>
    </div>
  </div>

  <script>
    // === 牌库 ===
    const baseDeck = [
      {
        id: "strike", name: "斬擊", cost: 1, target: "enemy",
        text: "造成 6 傷害。前排時 +2。",
        use: s => damageEnemy(s, 6 + (s.player.pos === "front" ? 2 : 0))
      },
      {
        id: "strike", name: "斬擊", cost: 1, target: "enemy",
        text: "造成 6 傷害。前排時 +2。",
        use: s => damageEnemy(s, 6 + (s.player.pos === "front" ? 2 : 0))
      },
      {
        id: "guard", name: "防禦", cost: 1, target: "self",
        text: "獲得 7 護甲。後排時 +3。",
        use: s => gainBlock(s.player, 7 + (s.player.pos === "back" ? 3 : 0))
      },
      {
        id: "guard", name: "防禦", cost: 1, target: "self",
        text: "獲得 7 護甲。後排時 +3。",
        use: s => gainBlock(s.player, 7 + (s.player.pos === "back" ? 3 : 0))
      },
      {
        id: "interrupt", name: "斷勢", cost: 1, target: "enemy",
        text: "造成 4 傷害。若敵人在蓄力，立即打斷並暈眩。",
        use: s => {
          damageEnemy(s, 4);
          if (s.enemy.chargePending) {
            s.enemy.chargePending = false;
            s.enemy.stunned = 1;
            log("你成功打斷敵人蓄力，敵人暈眩 1 回合！");
          }
        }
      },
      {
        id: "shift", name: "轉位", cost: 0, target: "self",
        text: "切換前/後排，並抽 1 張。",
        use: s => {
          s.player.pos = s.player.pos === "front" ? "back" : "front";
          draw(1);
          log(`你切換到${s.player.pos === "front" ? "前排" : "後排"}。`);
        }
      },
      {
        id: "blood", name: "血契", cost: 0, target: "self",
        text: "失去 3 生命，獲得 2 能量，抽 1。",
        use: s => {
          s.player.hp = Math.max(1, s.player.hp - 3);
          s.player.energy += 2;
          draw(1);
          log("你以生命換取爆發資源（-3HP，+2能量）。");
        }
      },
      {
        id: "pierce", name: "破甲重擊", cost: 2, target: "enemy",
        text: "造成 11 傷害，無視 50% 護甲。",
        use: s => damageEnemy(s, 11, 0.5)
      }
    ];

    let state;

    const drag = {
      active: false,
      uid: null,
      pointerId: null,
      cardEl: null,
      ghostEl: null,
      overTarget: null,
      startX: 0,
      startY: 0,
      moved: false
    };

    function newGame() {
      state = {
        player: { hp: 46, maxHp: 46, block: 0, energy: 3, pos: "front" },
        enemy: { hp: 72, maxHp: 72, block: 0, stunned: 0, chargePending: false, intent: null },
        deck: shuffle(baseDeck.map(c => ({ ...c, uid: Math.random().toString(36).slice(2) }))),
        discard: [],
        hand: [],
        turn: 1,
        ended: false
      };

      pickEnemyIntent();
      draw(5);
      logClear();
      log("戰鬥開始：拖牌到敵人/自己即可出牌，點角色可看解說。");
      render();
    }

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function draw(n) {
      for (let i = 0; i < n; i++) {
        if (state.deck.length === 0) {
          state.deck = shuffle(state.discard);
          state.discard = [];
        }
        if (state.deck.length === 0) break;
        state.hand.push(state.deck.pop());
      }
    }

    function gainBlock(unit, n) {
      unit.block += n;
      log(`${unit === state.player ? "你" : "敵人"}獲得 ${n} 護甲。`);
    }

    function damageEnemy(s, n, pierceRatio = 0) {
      const target = s.enemy;
      const bypass = Math.floor(target.block * pierceRatio);
      const effectiveBlock = Math.max(0, target.block - bypass);
      const blocked = Math.min(effectiveBlock, n);
      const dealt = Math.max(0, n - blocked);
      target.block = Math.max(0, effectiveBlock - blocked);
      target.hp -= dealt;
      log(`你造成 ${dealt} 傷害${blocked > 0 ? `（被擋 ${blocked}）` : ""}。`);
    }

    function damagePlayer(n) {
      const blocked = Math.min(state.player.block, n);
      const dealt = Math.max(0, n - blocked);
      state.player.block -= blocked;
      state.player.hp -= dealt;
      log(`敵人造成 ${dealt} 傷害${blocked > 0 ? `（你格擋 ${blocked}）` : ""}。`);
    }

    function pickEnemyIntent() {
      if (state.enemy.chargePending) {
        state.enemy.intent = { type: "slam", text: "爆裂斬：16 傷害（本回合必發）" };
        return;
      }
      const r = Math.random();
      if (r < 0.42) state.enemy.intent = { type: "attack", value: 9, text: "斬擊：9 傷害" };
      else if (r < 0.72) state.enemy.intent = { type: "guard", value: 8, text: "鐵壁：獲得 8 護甲" };
      else state.enemy.intent = { type: "charge", text: "蓄力：下回合打出爆裂斬（可打斷）" };
    }

    function canPlayCard(card) {
      if (!card) return false;
      if (state.ended) return false;
      return card.cost <= state.player.energy;
    }

    function targetLabel(target) {
      if (target === "enemy") return "拖到敵人";
      if (target === "self") return "拖到自己";
      return "拖到戰場";
    }

    function targetChip(target) {
      if (target === "enemy") return "攻擊牌";
      if (target === "self") return "支援牌";
      return "戰術牌";
    }

    function tryPlayCard(uid, target) {
      const idx = state.hand.findIndex(c => c.uid === uid);
      if (idx < 0) return;
      const card = state.hand[idx];
      if (!canPlayCard(card)) return;

      if (card.target === "enemy" && target !== "enemy") {
        log(`【${card.name}】需要拖到敵人。`);
        return;
      }
      if (card.target === "self" && target !== "self") {
        log(`【${card.name}】需要拖到自己。`);
        return;
      }

      state.player.energy -= card.cost;
      card.use(state);
      state.discard.push(card);
      state.hand.splice(idx, 1);

      checkEnd();
      render();
    }

    function endTurn() {
      if (state.ended) return;
      state.discard.push(...state.hand);
      state.hand = [];
      enemyAct();
      checkEnd();
      if (state.ended) return render();

      state.turn += 1;
      state.player.block = 0;
      state.enemy.block = Math.max(0, state.enemy.block - 3);
      state.player.energy = 3;
      pickEnemyIntent();
      draw(5);
      render();
    }

    function enemyAct() {
      if (state.enemy.stunned > 0) {
        state.enemy.stunned -= 1;
        log("敵人暈眩，行動失敗。");
        return;
      }
      const it = state.enemy.intent;
      if (!it) return;
      if (it.type === "attack") damagePlayer(it.value);
      else if (it.type === "guard") gainBlock(state.enemy, it.value);
      else if (it.type === "charge") {
        state.enemy.chargePending = true;
        log("敵人開始蓄力，下回合將使出爆裂斬！");
      } else if (it.type === "slam") {
        damagePlayer(16);
        state.enemy.chargePending = false;
      }
    }

    function checkEnd() {
      if (state.enemy.hp <= 0) {
        state.enemy.hp = 0;
        state.ended = true;
        log("你擊敗了敵人！", "win");
      } else if (state.player.hp <= 0) {
        state.player.hp = 0;
        state.ended = true;
        log("你被擊敗。提示：敵人蓄力時記得留【斷勢】。", "lose");
      }
    }

    function intentText() {
      if (state.enemy.stunned > 0) return "敵人意圖：<strong>暈眩中（本回合不動）</strong>";
      if (!state.enemy.intent) return "敵人意圖：-";
      return `敵人意圖：<strong>${state.enemy.intent.text}</strong>`;
    }

    function hpWidth(now, max) {
      const v = Math.max(0, Math.min(100, (now / max) * 100));
      return `${v}%`;
    }

    function render() {
      const p = state.player;
      const e = state.enemy;

      document.getElementById("turnBadge").textContent = `第 ${state.turn} 回合`;
      document.getElementById("posBadge").textContent = p.pos === "front" ? "前排（攻擊+）" : "後排（防禦+）";

      document.getElementById("enemyHpBar").style.width = hpWidth(e.hp, e.maxHp);
      document.getElementById("playerHpBar").style.width = hpWidth(p.hp, p.maxHp);

      const eTags = [];
      eTags.push(`<span class="chip hp">HP ${e.hp}/${e.maxHp}</span>`);
      if (e.block > 0) eTags.push(`<span class="chip block">護甲 ${e.block}</span>`);
      if (e.chargePending) eTags.push(`<span class="chip charge">蓄力中</span>`);
      if (e.stunned > 0) eTags.push(`<span class="chip stun">暈眩 ${e.stunned}</span>`);
      document.getElementById("enemyTags").innerHTML = eTags.join("");

      const pTags = [];
      pTags.push(`<span class="chip hp">HP ${p.hp}/${p.maxHp}</span>`);
      if (p.block > 0) pTags.push(`<span class="chip block">護甲 ${p.block}</span>`);
      pTags.push(`<span class="chip pos">${p.pos === "front" ? "前排" : "後排"}</span>`);
      document.getElementById("playerTags").innerHTML = pTags.join("");

      document.getElementById("intentBox").innerHTML = intentText();
      document.getElementById("energyVal").textContent = p.energy;
      document.getElementById("handCount").textContent = state.hand.length;
      document.getElementById("deckCount").textContent = state.deck.length;

      renderHand();

      const endBtn = document.getElementById("endTurnBtn");
      endBtn.disabled = state.ended;
      endBtn.textContent = state.ended ? "戰鬥已結束" : "結束回合";

      const tip = document.getElementById("handTips");
      tip.textContent = state.ended ? "戰鬥結束，點重開再試" : "拖到角色卡出牌";

      updateDropHint(null);
      clearDropHot();
    }

    function renderHand() {
      const p = state.player;
      const handEl = document.getElementById("hand");
      handEl.innerHTML = "";

      state.hand.forEach(c => {
        const card = document.createElement("button");
        card.className = `card ${canPlayCard(c) ? "" : "disabled"}`;
        card.dataset.uid = c.uid;
        card.dataset.target = c.target;
        card.innerHTML = `
          <div class="cost">${c.cost}</div>
          <div class="tag">${targetChip(c.target)}</div>
          <div class="name">${c.name}</div>
          <div class="desc">${c.text}</div>
          <div class="drag-note">${canPlayCard(c) ? targetLabel(c.target) : "能量不足"}</div>
        `;
        card.addEventListener("pointerdown", ev => startDrag(ev, c.uid, card));
        handEl.appendChild(card);
      });
    }

    // === 拖拽 ===
    function startDrag(e, uid, cardEl) {
      const card = state.hand.find(c => c.uid === uid);
      if (!canPlayCard(card)) return;

      drag.active = true;
      drag.uid = uid;
      drag.pointerId = e.pointerId;
      drag.cardEl = cardEl;
      drag.overTarget = null;
      drag.startX = e.clientX;
      drag.startY = e.clientY;
      drag.moved = false;

      document.addEventListener("pointermove", onDragMove);
      document.addEventListener("pointerup", onDragEnd);
      document.addEventListener("pointercancel", onDragEnd);
    }

    function onDragMove(e) {
      if (!drag.active || e.pointerId !== drag.pointerId) return;
      const dx = e.clientX - drag.startX;
      const dy = e.clientY - drag.startY;

      if (!drag.moved && Math.hypot(dx, dy) > 8) {
        drag.moved = true;
        drag.cardEl.classList.add("dragging");
        const ghost = document.createElement("div");
        ghost.className = "drag-ghost";
        ghost.innerHTML = drag.cardEl.innerHTML;
        document.body.appendChild(ghost);
        drag.ghostEl = ghost;
      }

      if (drag.moved) {
        moveGhost(e.clientX, e.clientY);
        refreshDropState(e.clientX, e.clientY);
      }
    }

    function onDragEnd(e) {
      if (!drag.active || e.pointerId !== drag.pointerId) return;

      const target = drag.overTarget;
      const uid = drag.uid;
      const moved = drag.moved;
      cleanupDrag();

      if (!moved) return; // 没拖动，由 click 逻辑处理
      if (target) tryPlayCard(uid, target);
    }

    function moveGhost(x, y) {
      if (!drag.ghostEl) return;
      drag.ghostEl.style.left = `${x}px`;
      drag.ghostEl.style.top = `${y}px`;
    }

    function pointInRect(x, y, rect) {
      return x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom;
    }

    function refreshDropState(x, y) {
      const card = state.hand.find(c => c.uid === drag.uid);
      if (!card) return;

      const enemyRect = document.getElementById("enemyDrop").getBoundingClientRect();
      const playerRect = document.getElementById("playerDrop").getBoundingClientRect();

      let over = null;
      if (pointInRect(x, y, enemyRect)) over = "enemy";
      if (pointInRect(x, y, playerRect)) over = "self";

      if (card.target === "enemy" && over !== "enemy") over = null;
      if (card.target === "self" && over !== "self") over = null;

      drag.overTarget = over;
      updateDropHint(over, card.target);
      applyDropHot(over);
    }

    function updateDropHint(over, cardNeed) {
      const el = document.getElementById("dropHint");
      el.classList.remove("hot");

      if (!drag.active || !drag.moved) {
        el.textContent = "拖牌到「敵人」或「自己」角色區來出牌，點角色可看解說";
        return;
      }

      if (over === "enemy") {
        el.textContent = "放開手指：對敵人出牌";
        el.classList.add("hot");
        return;
      }
      if (over === "self") {
        el.textContent = "放開手指：對自己出牌";
        el.classList.add("hot");
        return;
      }
      if (cardNeed === "enemy") el.textContent = "此牌需拖到敵人";
      else if (cardNeed === "self") el.textContent = "此牌需拖到自己";
      else el.textContent = "此牌可直接使用";
    }

    function clearDropHot() {
      document.getElementById("enemyDrop").classList.remove("drop-ready");
      document.getElementById("playerDrop").classList.remove("drop-ready");
    }

    function applyDropHot(target) {
      clearDropHot();
      if (target === "enemy") document.getElementById("enemyDrop").classList.add("drop-ready");
      if (target === "self") document.getElementById("playerDrop").classList.add("drop-ready");
    }

    function cleanupDrag() {
      if (drag.cardEl) drag.cardEl.classList.remove("dragging");
      if (drag.ghostEl && drag.ghostEl.parentNode) drag.ghostEl.parentNode.removeChild(drag.ghostEl);

      drag.active = false;
      drag.uid = null;
      drag.pointerId = null;
      drag.cardEl = null;
      drag.ghostEl = null;
      drag.overTarget = null;
      drag.moved = false;

      clearDropHot();
      updateDropHint(null);

      document.removeEventListener("pointermove", onDragMove);
      document.removeEventListener("pointerup", onDragEnd);
      document.removeEventListener("pointercancel", onDragEnd);
    }

    // === 解说弹层 ===
    const sheetMask = document.getElementById("sheetMask");

    function openSheet(who) {
      const isEnemy = who === "enemy";
      const u = isEnemy ? state.enemy : state.player;

      document.getElementById("sheetTitle").textContent = isEnemy ? "敵人解說" : "角色解說";
      document.getElementById("sheetName").textContent = isEnemy ? "斷罪騎士" : "你（站位核心）";
      document.getElementById("sheetAvatar").textContent = isEnemy ? "👹" : "🛡️";
      document.getElementById("sheetRow").className = `sheet-row ${isEnemy ? "enemy" : "player"}`;

      const meta = [];
      meta.push(`<span class="chip hp">HP ${u.hp}/${u.maxHp}</span>`);
      if (u.block > 0) meta.push(`<span class="chip block">護甲 ${u.block}</span>`);
      if (!isEnemy) meta.push(`<span class="chip pos">${state.player.pos === "front" ? "前排" : "後排"}</span>`);
      if (isEnemy && state.enemy.chargePending) meta.push(`<span class="chip charge">蓄力中</span>`);
      if (isEnemy && state.enemy.stunned > 0) meta.push(`<span class="chip stun">暈眩 ${state.enemy.stunned}</span>`);
      document.getElementById("sheetMeta").innerHTML = meta.join("");

      document.getElementById("sheetBody").innerHTML = isEnemy
        ? "斷罪騎士擅長節奏壓制：普攻、鐵壁、蓄力爆裂斬交替出招。<br>蓄力回合是<strong>打斷窗口</strong>，錯過就要硬吃一次大傷。"
        : "你的核心是<strong>站位切換</strong>：前排攻擊加成、後排防禦加成，可搭配【斷勢】打斷敵人蓄力。<br>資源靠【血契】換能量做爆發。";

      // 意图详解（仅敌人）
      const intentSec = document.getElementById("sheetIntentSec");
      const intentEl = document.getElementById("sheetIntent");
      if (isEnemy) {
        intentSec.style.display = "";
        const it = state.enemy.intent;
        if (state.enemy.stunned > 0) {
          intentEl.textContent = "本回合暈眩，不會行動。";
        } else if (!it) {
          intentEl.textContent = "—";
        } else if (it.type === "attack") {
          intentEl.innerHTML = `將造成 <strong>${it.value}</strong> 點傷害。建議：先堆疊護甲，或用【斷勢】削血。`;
        } else if (it.type === "guard") {
          intentEl.innerHTML = `將獲得 <strong>${it.value}</strong> 護甲。建議：優先出高傷牌（如【破甲重擊】）壓血。`;
        } else if (it.type === "charge") {
          intentEl.innerHTML = `正在蓄力，<strong>下回合</strong>將爆裂斬造成 16 傷害。建議：本回合就用【斷勢】打斷，讓它暈眩。`;
        } else if (it.type === "slam") {
          intentEl.innerHTML = `<strong>本回合必發</strong>：爆裂斬 16 傷害。建議：先堆滿護甲再結束回合。`;
        }
      } else {
        intentSec.style.display = "none";
      }

      // 状态
      const st = [];
      if (isEnemy) {
        if (state.enemy.chargePending) st.push("蓄力中：下回合爆裂斬");
        if (state.enemy.stunned > 0) st.push(`暈眩：剩 ${state.enemy.stunned} 回合`);
        if (state.enemy.block > 0) st.push(`護甲：${state.enemy.block}`);
        if (st.length === 0) st.push("無異常狀態");
      } else {
        st.push(`站位：${state.player.pos === "front" ? "前排（攻擊加成）" : "後排（防禦加成）"}`);
        if (state.player.block > 0) st.push(`護甲：${state.player.block}`);
        if (state.player.energy > 0) st.push(`能量：${state.player.energy}`);
      }
      document.getElementById("sheetStatus").innerHTML = st.map(s => `<span class="tag-s">${s}</span>`).join("");

      // 建议
      const tips = document.getElementById("sheetTips");
      const list = isEnemy
        ? [
            "蓄力回合優先使用【斷勢】造成打斷。",
            "對方堆甲時用【破甲重擊】穿甲壓血。",
            "普攻回合堆【防禦】或前排切後排減傷。"
          ]
        : [
            "前排多出【斬擊】，後排多出【防禦】。",
            "能量不夠時用【血契】換爆發（注意殘血）。",
            "保留 1 張【斷勢】應對蓄力。"
          ];
      tips.innerHTML = list.map(t => `<li>${t}</li>`).join("");

      sheetMask.classList.add("show");
    }

    function closeSheet() { sheetMask.classList.remove("show"); }

    // 点击角色区打开解说（拖拽时不触发）
    ["enemyDrop", "playerDrop"].forEach(id => {
      const el = document.getElementById(id);
      el.addEventListener("click", () => {
        if (drag.active && drag.moved) return;
        openSheet(id === "enemyDrop" ? "enemy" : "player");
      });
    });

    document.getElementById("sheetClose").addEventListener("click", closeSheet);
    sheetMask.addEventListener("click", e => {
      if (e.target === sheetMask) closeSheet();
    });
    document.getElementById("intentDetailBtn").addEventListener("click", () => openSheet("enemy"));

    document.getElementById("endTurnBtn").addEventListener("click", endTurn);
    document.getElementById("restartBtn").addEventListener("click", newGame);

    function log(text, cls = "") {
      const el = document.getElementById("log");
      const line = document.createElement("div");
      if (cls) line.className = cls;
      line.textContent = `• ${text}`;
      el.prepend(line);
    }

    function logClear() { document.getElementById("log").innerHTML = ""; }

    newGame();
  </script>
</body>
</html>
