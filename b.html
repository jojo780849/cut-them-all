<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <title>單手暴暴王 Lite</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; overflow: hidden; background: #080b12; font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC",sans-serif; color: #eef3ff; }
    #app { position: fixed; inset: 0; }
    canvas { width: 100%; height: 100%; display: block; background: radial-gradient(120% 90% at 50% 0%, #16253f 0%, #0b1220 45%, #080b12 100%); touch-action: none; }

    .hud {
      position: fixed;
      left: 10px;
      right: 10px;
      top: max(10px, env(safe-area-inset-top));
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      pointer-events: none;
    }
    .panel {
      background: rgba(7, 10, 18, 0.62);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 12px;
      padding: 8px 10px;
      backdrop-filter: blur(4px);
    }
    .row { display: flex; flex-wrap: wrap; gap: 8px 10px; font-size: 12px; }
    .title { font-weight: 700; font-size: 13px; margin-bottom: 6px; }
    .chip { border-radius: 999px; padding: 2px 8px; font-weight: 700; font-size: 12px; }
    .chip.good { background: rgba(73, 225, 151, 0.2); color: #8ef2c3; }
    .chip.warn { background: rgba(255, 194, 87, 0.2); color: #ffd58a; }
    .chip.bad { background: rgba(255, 111, 111, 0.2); color: #ffb0b0; }

    #hint {
      position: fixed;
      left: 50%;
      bottom: calc(12px + env(safe-area-inset-bottom));
      transform: translateX(-50%);
      background: rgba(7, 10, 18, 0.68);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      white-space: nowrap;
      pointer-events: none;
    }

    #gameOver {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.6);
      z-index: 6;
      padding: 16px;
    }
    .goCard {
      width: min(420px, 100%);
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(8, 12, 22, 0.95);
      padding: 16px;
    }
    .goTitle { font-size: 18px; font-weight: 800; margin-bottom: 8px; }
    .goBtn {
      margin-top: 12px;
      width: 100%;
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 11px;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <div id="app"><canvas id="game"></canvas></div>

  <div class="hud">
    <div class="panel">
      <div class="title">單手暴暴王 Lite</div>
      <div class="row">
        <span id="hp" class="chip good">HP 3</span>
        <span id="squad" class="chip">炸彈 1</span>
        <span id="shard" class="chip warn">爆風 2</span>
        <span id="kills" class="chip">擊殺 0</span>
        <span id="timer" class="chip">00:00</span>
      </div>
    </div>
    <div class="panel" style="min-width:98px;text-align:right;">
      <div style="font-size:11px;opacity:.8;">下一波</div>
      <div id="nextLv" style="font-size:18px;font-weight:800;">20</div>
    </div>
  </div>

  <div id="hint">左下固定搖桿移動｜右下按鈕/鬆手下彈｜下彈後短衝刺脫離</div>

  <div id="gameOver">
    <div class="goCard">
      <div class="goTitle">被炸翻了</div>
      <div id="goStats" style="opacity:.9;line-height:1.6"></div>
      <button id="restart" class="goBtn">再來一局</button>
    </div>
  </div>

<script>
(() => {
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const hpEl = document.getElementById("hp");
  const squadEl = document.getElementById("squad");
  const shardEl = document.getElementById("shard");
  const killsEl = document.getElementById("kills");
  const timerEl = document.getElementById("timer");
  const nextLvEl = document.getElementById("nextLv");
  const hintEl = document.getElementById("hint");
  const gameOverEl = document.getElementById("gameOver");
  const goStatsEl = document.getElementById("goStats");
  const restartBtn = document.getElementById("restart");

  const COLS = 15;
  const ROWS = 13;
  const CELL = 56;
  const WORLD_W = COLS * CELL;
  const WORLD_H = ROWS * CELL;
  const BOMB_DELAY = 1.7;
  const FLAME_LIFE = 0.34;

  let W = 0;
  let H = 0;
  let DPR = 1;

  const rand = (a, b) => a + Math.random() * (b - a);
  const clamp = (v, a, b) => Math.max(a, Math.min(b, v));

  function resize() {
    DPR = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    canvas.style.width = W + "px";
    canvas.style.height = H + "px";
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener("resize", resize);
  resize();

  const input = {
    pointerActive: false,
    pointerId: null,
    bombPointerId: null,
    sx: 0,
    sy: 0,
    mx: 0,
    my: 0,
    vx: 0,
    vy: 0,
    mag: 0,
    keys: new Set()
  };

  function joyAnchor() {
    return { x: Math.min(98, W * 0.24), y: H - 102 };
  }

  function bombButtonInfo() {
    return { x: W - 86, y: H - 102, r: 40 };
  }


  function makeGrid() {
    const g = [];
    for (let y = 0; y < ROWS; y++) {
      const row = [];
      for (let x = 0; x < COLS; x++) {
        let t = "empty";
        if (x === 0 || y === 0 || x === COLS - 1 || y === ROWS - 1) t = "wall";
        else if (x % 2 === 0 && y % 2 === 0) t = "wall";
        else if (Math.random() < 0.46) t = "brick";
        row.push(t);
      }
      g.push(row);
    }

    const safe = [
      [1, 1], [1, 2], [2, 1],
      [COLS - 2, ROWS - 2], [COLS - 2, ROWS - 3], [COLS - 3, ROWS - 2]
    ];
    for (const [x, y] of safe) g[y][x] = "empty";
    return g;
  }

  function cellCenter(cx, cy) {
    return { x: cx * CELL + CELL / 2, y: cy * CELL + CELL / 2 };
  }

  function worldToCell(x, y) {
    return { cx: clamp(Math.floor(x / CELL), 0, COLS - 1), cy: clamp(Math.floor(y / CELL), 0, ROWS - 1) };
  }

  function makeState() {
    const start = cellCenter(1, 1);
    return {
      time: 0,
      gameOver: false,
      player: {
        x: start.x,
        y: start.y,
        r: 14,
        hp: 3,
        maxHp: 3,
        speed: 188,
        bombStock: 1,
        bombPower: 2,
        bombCD: 0,
        bombPassTime: 0,
        escapeTime: 0,
        escapeX: 0,
        escapeY: 0,
        moveX: 1,
        moveY: 0,
        inv: 0
      },
      grid: makeGrid(),
      bombs: [],
      flames: [],
      drops: [],
      enemies: [],
      fx: [],
      kills: 0,
      waveTimer: 20,
      spawnCD: 1.6,
      score: 0
    };
  }

  let state = makeState();

  function addFx(x, y, text, c = "#fff") {
    state.fx.push({ x, y, text, c, life: 0.8 });
  }

  function isBombAt(cx, cy) {
    return state.bombs.some((b) => b.cx === cx && b.cy === cy);
  }

  function canPassCell(cx, cy, ignoreBomb = false) {
    if (cx < 0 || cy < 0 || cx >= COLS || cy >= ROWS) return false;
    if (state.grid[cy][cx] === "wall" || state.grid[cy][cx] === "brick") return false;
    if (!ignoreBomb && isBombAt(cx, cy)) return false;
    return true;
  }

  function tryMove(entity, nx, ny, dt, ignoreBomb = false) {

    const r = entity.r;
    const px = entity.x;
    const py = entity.y;

    const tx = clamp(nx, r + 2, WORLD_W - r - 2);
    const ty = clamp(ny, r + 2, WORLD_H - r - 2);

    function blocked(x, y) {
      const minCx = Math.floor((x - r) / CELL);
      const maxCx = Math.floor((x + r) / CELL);
      const minCy = Math.floor((y - r) / CELL);
      const maxCy = Math.floor((y + r) / CELL);
      for (let cy = minCy; cy <= maxCy; cy++) {
        for (let cx = minCx; cx <= maxCx; cx++) {
          if (!canPassCell(cx, cy, ignoreBomb)) return true;
        }
      }
      return false;
    }

    const sx = blocked(tx, py) ? px : tx;
    const sy = blocked(sx, ty) ? py : ty;

    entity.x = sx;
    entity.y = sy;

    if (dt > 0 && Math.abs(entity.x - px) + Math.abs(entity.y - py) < 0.001) {
      entity.x += rand(-0.1, 0.1);
      entity.y += rand(-0.1, 0.1);
    }
  }

  function placeBombFromPlayer(trigger = "release") {
    const p = state.player;
    if (p.bombStock <= 0 || p.bombCD > 0) return false;
    const { cx, cy } = worldToCell(p.x, p.y);
    if (isBombAt(cx, cy)) return false;
    if (state.grid[cy][cx] !== "empty") return false;

    p.bombStock -= 1;
    p.bombCD = 0.18;
    p.bombPassTime = Math.max(p.bombPassTime, 0.62);

    let ex = p.moveX;
    let ey = p.moveY;
    const el = Math.hypot(ex, ey);
    if (el < 0.1) {
      ex = input.vx;
      ey = input.vy;
    }
    const len = Math.hypot(ex, ey) || 1;
    p.escapeX = ex / len;
    p.escapeY = ey / len;
    p.escapeTime = trigger === "button" ? 0.26 : 0.42;

    state.bombs.push({ cx, cy, timer: BOMB_DELAY, power: p.bombPower, owner: "player" });
    addFx(p.x, p.y - 16, "下彈", "#9bceff");
    return true;
  }


  function explodeBomb(index) {
    const bomb = state.bombs[index];
    if (!bomb) return;
    state.bombs.splice(index, 1);
    if (bomb.owner === "player") {
      state.player.bombStock = Math.min(8, state.player.bombStock + 1);
    }

    const cells = [{ cx: bomb.cx, cy: bomb.cy }];
    const dirs = [[1,0],[-1,0],[0,1],[0,-1]];

    for (const [dx, dy] of dirs) {
      for (let step = 1; step <= bomb.power; step++) {
        const cx = bomb.cx + dx * step;
        const cy = bomb.cy + dy * step;
        if (cx < 0 || cy < 0 || cx >= COLS || cy >= ROWS) break;

        const tile = state.grid[cy][cx];
        if (tile === "wall") break;

        cells.push({ cx, cy });

        if (tile === "brick") {
          state.grid[cy][cx] = "empty";
          if (Math.random() < 0.36) {
            const dropType = Math.random();
            const kind = dropType < 0.4 ? "power" : (dropType < 0.72 ? "bomb" : (dropType < 0.9 ? "speed" : "heal"));
            const c = cellCenter(cx, cy);
            state.drops.push({ x: c.x, y: c.y, kind, r: 10 });
          }
          break;
        }
      }
    }

    for (const c of cells) {
      state.flames.push({ cx: c.cx, cy: c.cy, life: FLAME_LIFE });
      const chainIdx = state.bombs.findIndex((b) => b.cx === c.cx && b.cy === c.cy);
      if (chainIdx >= 0) {
        state.bombs[chainIdx].timer = Math.min(0.02, state.bombs[chainIdx].timer);
      }
    }

    const epic = cells.length >= 8 ? "連鎖" : "爆";
    const center = cellCenter(bomb.cx, bomb.cy);
    addFx(center.x, center.y - 10, epic, "#ffc680");
  }

  function flameHits(cx, cy) {
    return state.flames.some((f) => f.cx === cx && f.cy === cy);
  }

  function spawnEnemy() {
    const spots = [
      { cx: COLS - 2, cy: ROWS - 2 },
      { cx: COLS - 2, cy: 1 },
      { cx: 1, cy: ROWS - 2 }
    ];

    const spawn = spots[Math.floor(Math.random() * spots.length)];
    const tile = state.grid[spawn.cy][spawn.cx];
    if (tile !== "empty" || isBombAt(spawn.cx, spawn.cy)) return;

    const c = cellCenter(spawn.cx, spawn.cy);
    const typeR = Math.random();
    let type = "chaser";
    if (typeR < 0.28) type = "runner";
    else if (typeR > 0.82) type = "tank";

    const stat = {
      runner: { speed: 116, hp: 1, color: "#ff7be1", icon: "⚡" },
      chaser: { speed: 92, hp: 2, color: "#ff6f7f", icon: "●" },
      tank: { speed: 68, hp: 4, color: "#ffad5e", icon: "🛡" }
    }[type];

    state.enemies.push({ x: c.x, y: c.y, r: 13, hp: stat.hp, maxHp: stat.hp, speed: stat.speed, type, color: stat.color, icon: stat.icon, thinkCD: 0, dirX: 0, dirY: 0 });
  }

  function updatePlayer(dt) {
    const p = state.player;
    p.bombCD = Math.max(0, p.bombCD - dt);
    p.bombPassTime = Math.max(0, p.bombPassTime - dt);
    p.escapeTime = Math.max(0, p.escapeTime - dt);
    p.inv = Math.max(0, p.inv - dt);

    let vx = 0;
    let vy = 0;

    if (input.pointerActive) {
      const len = Math.hypot(input.vx, input.vy) || 1;
      vx += input.vx / len * input.mag;
      vy += input.vy / len * input.mag;
    }

    if (input.keys.has("w") || input.keys.has("arrowup")) vy -= 1;
    if (input.keys.has("s") || input.keys.has("arrowdown")) vy += 1;
    if (input.keys.has("a") || input.keys.has("arrowleft")) vx -= 1;
    if (input.keys.has("d") || input.keys.has("arrowright")) vx += 1;

    if (p.escapeTime > 0) {
      vx += p.escapeX * 0.88;
      vy += p.escapeY * 0.88;
    }

    const mv = Math.hypot(vx, vy);
    if (mv > 0.01) {
      p.moveX = vx / mv;
      p.moveY = vy / mv;
      const dashMul = p.escapeTime > 0 ? 1.34 : 1;
      tryMove(p, p.x + p.moveX * p.speed * dashMul * dt, p.y + p.moveY * p.speed * dashMul * dt, dt, p.bombPassTime > 0);
    }
  }


  function updateBombs(dt) {
    for (let i = state.bombs.length - 1; i >= 0; i--) {
      const b = state.bombs[i];
      b.timer -= dt;
      if (b.timer <= 0) explodeBomb(i);
    }
  }

  function updateFlames(dt) {
    for (let i = state.flames.length - 1; i >= 0; i--) {
      state.flames[i].life -= dt;
      if (state.flames[i].life <= 0) state.flames.splice(i, 1);
    }
  }

  function updateEnemies(dt) {
    const p = state.player;

    for (let i = state.enemies.length - 1; i >= 0; i--) {
      const e = state.enemies[i];
      const ec = worldToCell(e.x, e.y);

      if (flameHits(ec.cx, ec.cy)) {
        e.hp -= 3;
        if (e.hp <= 0) {
          state.kills += 1;
          state.score += 4;
          addFx(e.x, e.y - 12, "+1", "#ffd27b");
          state.enemies.splice(i, 1);
          continue;
        }
      }

      e.thinkCD -= dt;
      if (e.thinkCD <= 0) {
        const dx = p.x - e.x;
        const dy = p.y - e.y;
        const chase = Math.random() < 0.76;
        if (chase) {
          const len = Math.hypot(dx, dy) || 1;
          e.dirX = dx / len;
          e.dirY = dy / len;
        } else {
          const r = Math.floor(Math.random() * 4);
          if (r === 0) { e.dirX = 1; e.dirY = 0; }
          if (r === 1) { e.dirX = -1; e.dirY = 0; }
          if (r === 2) { e.dirX = 0; e.dirY = 1; }
          if (r === 3) { e.dirX = 0; e.dirY = -1; }
        }
        e.thinkCD = rand(0.16, 0.34);
      }

      const nx = e.x + e.dirX * e.speed * dt;
      const ny = e.y + e.dirY * e.speed * dt;
      const ox = e.x;
      const oy = e.y;
      tryMove(e, nx, ny, dt);

      if (Math.abs(e.x - ox) + Math.abs(e.y - oy) < 0.01) {
        e.thinkCD = 0;
      }

      const dist = Math.hypot(p.x - e.x, p.y - e.y);
      if (dist < p.r + e.r - 2 && p.inv <= 0) {
        p.hp -= 1;
        p.inv = 1.2;
        addFx(p.x, p.y - 18, "-1", "#ffb0b0");
        if (p.hp <= 0) {
          state.gameOver = true;
          return;
        }
      }
    }
  }

  function updateDrops(dt) {
    const p = state.player;
    for (let i = state.drops.length - 1; i >= 0; i--) {
      const d = state.drops[i];
      const dx = p.x - d.x;
      const dy = p.y - d.y;
      const d2 = dx * dx + dy * dy;
      if (d2 < 92 * 92) {
        const len = Math.hypot(dx, dy) || 1;
        d.x += dx / len * 240 * dt;
        d.y += dy / len * 240 * dt;
      }
      if (d2 < (p.r + d.r + 6) * (p.r + d.r + 6)) {
        if (d.kind === "power") {
          p.bombPower = Math.min(7, p.bombPower + 1);
          addFx(p.x, p.y - 20, "爆風+1", "#ffc680");
        } else if (d.kind === "bomb") {
          p.bombStock = Math.min(8, p.bombStock + 1);
          addFx(p.x, p.y - 20, "炸彈+1", "#9bceff");
        } else if (d.kind === "speed") {
          p.speed = Math.min(280, p.speed + 12);
          addFx(p.x, p.y - 20, "移速+", "#8ef2c3");
        } else if (d.kind === "heal") {
          p.hp = Math.min(p.maxHp, p.hp + 1);
          addFx(p.x, p.y - 20, "HP+1", "#8ef2c3");
        }
        state.drops.splice(i, 1);
      }
    }
  }

  function updateWave(dt) {
    state.waveTimer -= dt;
    state.spawnCD -= dt;

    const activeCap = 4 + Math.floor(state.time / 26);
    if (state.spawnCD <= 0 && state.enemies.length < activeCap) {
      spawnEnemy();
      if (Math.random() < Math.min(0.42, state.time / 180)) spawnEnemy();
      state.spawnCD = Math.max(0.36, 1.2 - state.time * 0.0042);
    }

    if (state.waveTimer <= 0) {
      state.waveTimer = Math.max(9, 20 - state.time * 0.05);
      for (let i = 0; i < 2 + Math.floor(state.time / 55); i++) spawnEnemy();
      addFx(state.player.x, state.player.y - 26, "怪潮來了", "#ffb0b0");
    }
  }

  function updateFx(dt) {
    for (let i = state.fx.length - 1; i >= 0; i--) {
      state.fx[i].life -= dt;
      if (state.fx[i].life <= 0) state.fx.splice(i, 1);
    }
  }

  function drawMap(camX, camY) {
    const startX = Math.floor((camX - W / 2) / CELL) - 1;
    const endX = Math.floor((camX + W / 2) / CELL) + 1;
    const startY = Math.floor((camY - H / 2) / CELL) - 1;
    const endY = Math.floor((camY + H / 2) / CELL) + 1;

    for (let cy = startY; cy <= endY; cy++) {
      if (cy < 0 || cy >= ROWS) continue;
      for (let cx = startX; cx <= endX; cx++) {
        if (cx < 0 || cx >= COLS) continue;
        const sx = cx * CELL - camX + W / 2;
        const sy = cy * CELL - camY + H / 2;
        const tile = state.grid[cy][cx];

        ctx.fillStyle = ((cx + cy) % 2 === 0) ? "#1a2744" : "#14203a";
        ctx.fillRect(sx, sy, CELL, CELL);

        if (tile === "wall") {
          ctx.fillStyle = "#4c5b79";
          ctx.fillRect(sx + 3, sy + 3, CELL - 6, CELL - 6);
          ctx.fillStyle = "rgba(255,255,255,0.16)";
          ctx.fillRect(sx + 8, sy + 8, CELL - 16, 6);
        } else if (tile === "brick") {
          ctx.fillStyle = "#7b583d";
          ctx.fillRect(sx + 4, sy + 4, CELL - 8, CELL - 8);
          ctx.fillStyle = "#b48a65";
          ctx.fillRect(sx + 8, sy + 10, CELL - 16, 5);
        }
      }
    }
  }

  function drawBombPreview(camX, camY) {
    const p = state.player;
    if (p.bombCD > 0 || p.bombStock <= 0) return;
    const { cx, cy } = worldToCell(p.x, p.y);
    if (state.grid[cy][cx] !== "empty" || isBombAt(cx, cy)) return;

    const cells = [{ cx, cy }];
    const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
    for (const [dx, dy] of dirs) {
      for (let step = 1; step <= p.bombPower; step++) {
        const tx = cx + dx * step;
        const ty = cy + dy * step;
        if (tx < 0 || ty < 0 || tx >= COLS || ty >= ROWS) break;
        const t = state.grid[ty][tx];
        if (t === "wall") break;
        cells.push({ cx: tx, cy: ty });
        if (t === "brick") break;
      }
    }

    ctx.fillStyle = "rgba(255, 210, 130, 0.18)";
    for (const c of cells) {
      const x = c.cx * CELL - camX + W / 2;
      const y = c.cy * CELL - camY + H / 2;
      ctx.fillRect(x + 3, y + 3, CELL - 6, CELL - 6);
    }
  }

  function drawControls() {
    const joy = joyAnchor();
    const bomb = bombButtonInfo();
    const maxR = 54;
    const kx = joy.x + input.vx;
    const ky = joy.y + input.vy;

    ctx.fillStyle = "rgba(255,255,255,0.08)";
    ctx.strokeStyle = "rgba(255,255,255,0.22)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(joy.x, joy.y, maxR, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = "rgba(185, 224, 255, 0.32)";
    ctx.strokeStyle = "rgba(185, 224, 255, 0.85)";
    ctx.beginPath();
    ctx.arc(kx, ky, 22, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    const ready = state.player.bombStock > 0 && state.player.bombCD <= 0;
    ctx.fillStyle = ready ? "rgba(255,194,122,0.32)" : "rgba(160,160,160,0.22)";
    ctx.strokeStyle = ready ? "rgba(255,214,150,0.92)" : "rgba(180,180,180,0.45)";
    ctx.beginPath();
    ctx.arc(bomb.x, bomb.y, bomb.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = "#fff4df";
    ctx.font = "bold 26px -apple-system,Segoe UI,Roboto";
    ctx.textAlign = "center";
    ctx.fillText("💣", bomb.x, bomb.y + 9);
  }


  function draw() {
    ctx.clearRect(0, 0, W, H);

    const camX = clamp(state.player.x, W / 2, WORLD_W - W / 2);
    const camY = clamp(state.player.y, H / 2, WORLD_H - H / 2);
    const toScreenX = (x) => x - camX + W / 2;
    const toScreenY = (y) => y - camY + H / 2;

    drawMap(camX, camY);
    drawBombPreview(camX, camY);

    for (const d of state.drops) {
      const sx = toScreenX(d.x);
      const sy = toScreenY(d.y);
      let color = "#ffe078";
      let icon = "◆";
      if (d.kind === "power") { color = "#ffc680"; icon = "✸"; }
      if (d.kind === "bomb") { color = "#9bceff"; icon = "✦"; }
      if (d.kind === "speed") { color = "#8ef2c3"; icon = "➤"; }
      if (d.kind === "heal") { color = "#9df7a7"; icon = "✚"; }

      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(sx, sy, d.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#0d1527";
      ctx.font = "bold 11px -apple-system,Segoe UI,Roboto";
      ctx.textAlign = "center";
      ctx.fillText(icon, sx, sy + 4);
    }

    for (const b of state.bombs) {
      const c = cellCenter(b.cx, b.cy);
      const sx = toScreenX(c.x);
      const sy = toScreenY(c.y);
      ctx.fillStyle = "#0f1729";
      ctx.beginPath();
      ctx.arc(sx, sy, 14, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "#d9e5ff";
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.fillStyle = "#ffcc77";
      ctx.font = "bold 10px -apple-system,Segoe UI,Roboto";
      ctx.textAlign = "center";
      ctx.fillText((Math.max(0, b.timer)).toFixed(1), sx, sy + 3);
    }

    for (const f of state.flames) {
      const x = f.cx * CELL - camX + W / 2;
      const y = f.cy * CELL - camY + H / 2;
      const alpha = clamp(f.life / FLAME_LIFE, 0, 1);
      ctx.fillStyle = `rgba(255, 184, 88, ${0.22 + alpha * 0.55})`;
      ctx.fillRect(x + 2, y + 2, CELL - 4, CELL - 4);
      ctx.fillStyle = `rgba(255, 235, 177, ${0.28 + alpha * 0.55})`;
      ctx.fillRect(x + 10, y + 10, CELL - 20, CELL - 20);
    }

    for (const e of state.enemies) {
      const sx = toScreenX(e.x);
      const sy = toScreenY(e.y);
      ctx.fillStyle = e.color;
      ctx.beginPath();
      ctx.arc(sx, sy, e.r, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#fff1f6";
      ctx.font = "bold 12px -apple-system,Segoe UI,Roboto";
      ctx.textAlign = "center";
      ctx.fillText(e.icon, sx, sy + 4);

      ctx.fillStyle = "rgba(0,0,0,0.36)";
      ctx.fillRect(sx - e.r, sy - e.r - 6, e.r * 2, 3);
      ctx.fillStyle = "#ffd1d1";
      ctx.fillRect(sx - e.r, sy - e.r - 6, (e.hp / e.maxHp) * e.r * 2, 3);
    }

    const p = state.player;
    const psx = toScreenX(p.x);
    const psy = toScreenY(p.y);
    ctx.fillStyle = p.inv > 0 ? "#ff9fa8" : "#d7e7ff";
    ctx.beginPath();
    ctx.arc(psx, psy, p.r, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "#1b2946";
    ctx.font = "bold 12px -apple-system,Segoe UI,Roboto";
    ctx.textAlign = "center";
    ctx.fillText("💣", psx, psy + 4);

    for (const fx of state.fx) {
      const sx = toScreenX(fx.x);
      const sy = toScreenY(fx.y - (1 - fx.life) * 30);
      ctx.globalAlpha = clamp(fx.life, 0, 1);
      ctx.fillStyle = fx.c;
      ctx.font = "bold 13px -apple-system,Segoe UI,Roboto";
      ctx.textAlign = "center";
      ctx.fillText(fx.text, sx, sy);
      ctx.globalAlpha = 1;
    }

    drawControls();
  }

  function updateHud() {
    const p = state.player;
    hpEl.textContent = "HP " + p.hp;
    hpEl.className = "chip " + (p.hp >= 3 ? "good" : (p.hp === 2 ? "warn" : "bad"));
    squadEl.textContent = "炸彈 " + p.bombStock;
    shardEl.textContent = "爆風 " + p.bombPower;
    killsEl.textContent = "擊殺 " + state.kills;

    const t = Math.floor(state.time);
    const mm = String(Math.floor(t / 60)).padStart(2, "0");
    const ss = String(t % 60).padStart(2, "0");
    timerEl.textContent = mm + ":" + ss;
    nextLvEl.textContent = String(Math.max(0, Math.floor(state.waveTimer)));
  }

  function showGameOver() {
    state.gameOver = true;
    goStatsEl.innerHTML =
      "生存時間：<b>" + timerEl.textContent + "</b><br>" +
      "擊殺：<b>" + state.kills + "</b><br>" +
      "炸彈上限：<b>" + state.player.bombStock + "</b><br>" +
      "爆風：<b>" + state.player.bombPower + "</b><br>" +
      "分數：<b>" + state.score + "</b>";
    gameOverEl.style.display = "flex";
  }

  function resetPointer() {
    input.pointerActive = false;
    input.pointerId = null;
    input.bombPointerId = null;
    input.vx = 0;
    input.vy = 0;
    input.mag = 0;
  }


  canvas.addEventListener("pointerdown", (e) => {
    if (state.gameOver) return;

    const bomb = bombButtonInfo();
    const bd = Math.hypot(e.clientX - bomb.x, e.clientY - bomb.y);
    if (bd <= bomb.r) {
      input.bombPointerId = e.pointerId;
      placeBombFromPlayer("button");
      return;
    }

    if (e.clientX > W * 0.68) return;

    const joy = joyAnchor();
    input.pointerActive = true;
    input.pointerId = e.pointerId;
    input.sx = joy.x;
    input.sy = joy.y;
    input.mx = e.clientX;
    input.my = e.clientY;
    input.vx = 0;
    input.vy = 0;
    input.mag = 0;
  });

  canvas.addEventListener("pointermove", (e) => {
    if (!input.pointerActive || input.pointerId !== e.pointerId) return;
    const dx = e.clientX - input.sx;
    const dy = e.clientY - input.sy;
    const len = Math.hypot(dx, dy) || 1;
    const maxR = 54;
    const c = Math.min(maxR, len);
    input.vx = dx / len * c;
    input.vy = dy / len * c;
    input.mag = c / maxR;
  });

  function releasePointer(e) {
    if (input.bombPointerId === e.pointerId) {
      input.bombPointerId = null;
      return;
    }

    if (!input.pointerActive || input.pointerId !== e.pointerId) return;
    placeBombFromPlayer("release");
    resetPointer();
  }

  canvas.addEventListener("pointerup", releasePointer);
  canvas.addEventListener("pointercancel", releasePointer);


  window.addEventListener("keydown", (e) => {
    const k = e.key.toLowerCase();
    input.keys.add(k);
    if (k === " ") placeBombFromPlayer("button");
  });
  window.addEventListener("keyup", (e) => input.keys.delete(e.key.toLowerCase()));

  restartBtn.addEventListener("click", () => {
    state = makeState();
    gameOverEl.style.display = "none";
    hintEl.style.opacity = "1";
    resetPointer();
  });

  let last = performance.now();
  function loop(now) {
    const dt = Math.min(0.033, (now - last) / 1000);
    last = now;

    if (!state.gameOver) {
      state.time += dt;
      updatePlayer(dt);
      updateBombs(dt);
      updateFlames(dt);
      updateEnemies(dt);
      updateDrops(dt);
      updateWave(dt);
      updateFx(dt);

      if (state.player.hp <= 0) showGameOver();

      if (state.time > 0.8 && hintEl.style.opacity !== "0") {
        hintEl.style.opacity = String(Math.max(0, 1 - state.time / 10));
      }
    }

    draw();
    updateHud();
    requestAnimationFrame(loop);
  }

  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
