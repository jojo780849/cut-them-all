<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
  <title>Claw 機制鏡像 v1</title>
  <style>
    :root{--bg:#111;--panel:#1b1b1b;--card:#f5e8c8;--ink:#1a1712;--red:#d85c5c;--gold:#f0c977;--blue:#6cb8ff;--ok:#74d68f}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{margin:0;background:linear-gradient(180deg,#15100f,#0d0a0a);color:#f6f0e5;font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Noto Sans TC",sans-serif}
    .app{max-width:430px;margin:0 auto;min-height:100dvh;padding:8px 10px calc(env(safe-area-inset-bottom) + 8px);position:relative}
    .row{display:flex;gap:8px;align-items:center}
    .between{justify-content:space-between}
    .top{margin-bottom:8px}
    .pill{background:#201b18;border:1px solid #3a2f28;border-radius:999px;padding:6px 10px;font-size:12px}
    .title{font-weight:900;letter-spacing:.9px;font-size:15px}

    .battle{position:relative;height:calc(100dvh - 220px);min-height:420px;background:radial-gradient(circle at 52% 10%,rgba(255,238,198,.08),transparent 30%),linear-gradient(180deg,#1a1412,#120e0d 60%,#100c0c);border:1px solid #3a2f28;border-radius:18px;overflow:hidden}
    .battle::after{content:"";position:absolute;inset:8px;border-radius:14px;border:1px solid rgba(255,255,255,.05);pointer-events:none}

    .hero-panel{position:absolute;left:10px;bottom:118px;width:148px;padding:8px;border:1px solid #433831;border-radius:12px;background:rgba(30,26,23,.9);z-index:3}
    .hero-stand{position:absolute;left:8px;bottom:102px;width:160px;height:190px;border-radius:16px;background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,0) 26%),linear-gradient(180deg,#3f203f,#221522);opacity:.32;z-index:1}
    .bar{height:10px;background:#2c2622;border-radius:999px;overflow:hidden;border:1px solid #4a3f38}
    .fill{height:100%;background:linear-gradient(90deg,#b94444,#e88989)}

    .enemy-layer{position:absolute;right:8px;top:76px;width:250px;height:250px;z-index:4}
    .enemy{position:absolute;padding:6px;border:1px solid #493a33;border-radius:12px;background:#221c19;box-shadow:0 8px 16px rgba(0,0,0,.28)}
    .enemy.enemy_far{left:0;top:42px;width:124px}
    .enemy.enemy_mid{left:78px;top:24px;width:132px}
    .enemy.enemy_near{left:154px;top:0;width:96px}
    .enemy.sel{outline:2px solid var(--gold)}
    .enemy.dead{opacity:.4;filter:grayscale(1)}
    .enemy .name{font-size:11px;font-weight:700}
    .enemy .hp{font-size:10px;opacity:.9}
    .intent{font-size:11px;color:#ffd7cf;margin-top:4px}

    .hint{position:absolute;left:10px;right:10px;top:10px;font-size:12px;color:#dbc9a8;min-height:18px;z-index:5;background:rgba(18,14,12,.62);border:1px solid rgba(255,255,255,.06);border-radius:999px;padding:5px 10px}

    .hud-left{position:absolute;left:12px;bottom:74px;display:flex;align-items:center;gap:7px;padding:7px 9px;border-radius:999px;background:rgba(17,14,13,.72);border:1px solid rgba(255,255,255,.08);z-index:6}
    .hud-left .label{font-size:11px;color:#d7c8ab}
    .energy{display:flex;gap:4px}
    .gem{width:14px;height:14px;clip-path:polygon(50% 0,100% 50%,50% 100%,0 50%);background:var(--blue)}
    .gem.off{opacity:.2}

    .hand{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(env(safe-area-inset-bottom) + 64px);width:min(410px,calc(100vw - 12px));display:flex;gap:6px;justify-content:flex-start;overflow-x:auto;padding:0 6px 3px;z-index:8}
    .hand::-webkit-scrollbar{display:none}
    .card{flex:0 0 92px;width:92px;min-height:132px;border:2px solid #6f5b46;border-radius:14px;background:var(--card);color:var(--ink);padding:8px;position:relative;box-shadow:0 8px 16px rgba(0,0,0,.25)}
    .card .cost{position:absolute;left:8px;top:8px;background:#1f1a16;color:var(--blue);border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-weight:800}
    .card h4{margin:24px 0 4px;font-size:13px;line-height:1.2}
    .card p{margin:0;font-size:11px;line-height:1.35}
    .card button{margin-top:6px;width:100%;border:0;border-radius:8px;padding:6px;background:#2c241f;color:#fff;font-weight:700}
    .card button[disabled]{opacity:.35}

    .ctl{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(env(safe-area-inset-bottom) + 10px);width:min(410px,calc(100vw - 12px));display:flex;justify-content:flex-end;z-index:9;padding-right:6px}
    .end{width:142px;border:0;border-radius:12px;padding:14px 10px;background:linear-gradient(180deg,#f0d79f,#cfaa68);font-weight:900;color:#2b2014;letter-spacing:1px;box-shadow:0 8px 18px rgba(0,0,0,.3)}
  </style>
</head>
<body>
  <div class="app">
    <div class="row between top">
      <div class="title">幽塔・術士（H5 機制鏡像 v1.1）</div>
      <div class="pill" id="turn">回合 1</div>
    </div>

    <section class="battle">
      <div class="hint" id="hint">點卡牌，單體卡再點怪物出牌</div>

      <div class="hero-stand"></div>
      <div class="hero-panel">
        <div class="row between"><b>術士</b><span id="heroHpText">HP 80/80</span></div>
        <div class="bar"><div class="fill" id="heroHpFill" style="width:100%"></div></div>
      </div>

      <div class="enemy-layer" id="enemies"></div>

      <div class="hud-left">
        <span class="label">能量</span>
        <div class="energy" id="energy"></div>
      </div>
    </section>
  </div>

  <div class="hand" id="hand"></div>
  <div class="ctl"><button class="end" id="endBtn">結束回合</button></div>

<script>
const DECK_TEMPLATES = [
  {name:"暗焰箭",cost:1,text:"造成 8 傷害",target:"enemy",damage:8},
  {name:"暗焰箭",cost:1,text:"造成 8 傷害",target:"enemy",damage:8},
  {name:"靈火連射",cost:2,text:"造成 16 傷害",target:"enemy",damage:16},
  {name:"詛咒之釘",cost:1,text:"造成 6 傷害，抽 1",target:"enemy",damage:6,draw:1},
  {name:"靈魂虹吸",cost:2,text:"造成 12 傷害，回 3 HP",target:"enemy",damage:12,heal:3},
  {name:"惡契汲取",cost:0,text:"失去 2 HP，+1 能量，抽 1",target:"self",selfDamage:2,energyGain:1,draw:1},
  {name:"鮮血導流",cost:1,text:"失去 3 HP，+2 能量",target:"self",selfDamage:3,energyGain:2},
  {name:"換手施法",cost:1,text:"抽 2",target:"self",draw:2}
];

const ENEMY_PRESET = [
  {id:"enemy_far",name:"紙甲陰兵",maxHp:24,pattern:[6,7,8],idx:0},
  {id:"enemy_mid",name:"請魂紙偶",maxHp:28,pattern:[7,9,11],idx:0},
  {id:"enemy_near",name:"哨戒鬼差",maxHp:36,pattern:[8,10,12],idx:0}
];

const S={
  turn:1,playerTurn:true,
  player:{hp:80,maxHp:80,energy:3,maxEnergy:3,block:0},
  enemies:[],drawPile:[],discard:[],hand:[],uid:1,selectedCard:null,selectedEnemy:null
};

function cloneCard(t){return {...t,uid:S.uid++};}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=(Math.random()*(i+1))|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
function aliveEnemies(){return S.enemies.filter(e=>e.hp>0);} 
function setHint(t){document.getElementById("hint").textContent=t;}

function init(){
  S.enemies=ENEMY_PRESET.map(e=>({...e,hp:e.maxHp,intent:e.pattern[0]}));
  S.drawPile=shuffle(DECK_TEMPLATES.map(cloneCard));
  drawCards(5);
  renderAll();
}

function drawCards(n){
  for(let i=0;i<n;i++){
    if(!S.drawPile.length){S.drawPile=shuffle(S.discard);S.discard=[];}
    if(!S.drawPile.length)break;
    S.hand.push(S.drawPile.pop());
  }
}

function renderAll(){renderTop();renderEnergy();renderEnemies();renderHand();}
function renderTop(){document.getElementById("turn").textContent=`回合 ${S.turn}`;document.getElementById("heroHpText").textContent=`HP ${S.player.hp}/${S.player.maxHp}`;document.getElementById("heroHpFill").style.width=`${Math.max(0,S.player.hp)/S.player.maxHp*100}%`;}
function renderEnergy(){const el=document.getElementById("energy");el.innerHTML="";for(let i=0;i<S.player.maxEnergy;i++){const d=document.createElement("div");d.className="gem"+(i<S.player.energy?"":" off");el.appendChild(d);} }

function renderEnemies(){
  const root=document.getElementById("enemies");root.innerHTML="";
  const posMap={enemy_far:"enemy_far",enemy_mid:"enemy_mid",enemy_near:"enemy_near"};
  S.enemies.forEach(e=>{
    const d=document.createElement("div");
    d.className="enemy "+(posMap[e.id]||"enemy_mid")+(e.hp<=0?" dead":"")+(S.selectedEnemy===e.id?" sel":"");
    d.innerHTML=`<div class="row between"><span class="name">${e.name}</span><span class="hp">${e.hp}/${e.maxHp}</span></div><div class="bar" style="margin-top:4px"><div class="fill" style="width:${Math.max(0,e.hp)/e.maxHp*100}%"></div></div><div class="intent">⚔ ${e.intent}</div>`;
    d.onclick=()=>{
      if(e.hp<=0)return;
      S.selectedEnemy=e.id;
      if(S.selectedCard){tryPlay(S.selectedCard.uid,e.id);} else {setHint(`已選目標：${e.name}`);renderEnemies();}
    };
    root.appendChild(d);
  });
}

function cardPlayable(c){return S.player.energy>=c.cost && S.playerTurn;}

function renderHand(){
  const root=document.getElementById("hand");root.innerHTML="";
  S.hand.forEach(c=>{
    const d=document.createElement("div");d.className="card";
    d.innerHTML=`<div class="cost">${c.cost}</div><h4>${c.name}</h4><p>${c.text}</p><button ${cardPlayable(c)?"":"disabled"}>${S.selectedCard?.uid===c.uid?"已選中":"使用"}</button>`;
    d.querySelector("button").onclick=()=>{
      if(!cardPlayable(c))return;
      if(c.target==="enemy"){
        S.selectedCard=c;
        setHint("這張是單體卡：請再點一隻怪");
        renderHand();
      }else{
        tryPlay(c.uid,null);
      }
    };
    root.appendChild(d);
  });
}

function removeHand(uid){const i=S.hand.findIndex(c=>c.uid===uid);if(i<0)return null;return S.hand.splice(i,1)[0];}
function enemyById(id){return S.enemies.find(e=>e.id===id&&e.hp>0)||aliveEnemies()[0]||null;}

function tryPlay(cardUid,targetId){
  if(!S.playerTurn)return;
  const c=S.hand.find(x=>x.uid===cardUid); if(!c)return;
  if(S.player.energy<c.cost){setHint("能量不足");return;}
  if(c.target==="enemy"&&!targetId){setHint("先選敵人");return;}

  S.player.energy-=c.cost;
  const played=removeHand(cardUid);
  resolveCard(played,targetId);
  S.discard.push(played);
  S.selectedCard=null;
  S.selectedEnemy=null;

  if(aliveEnemies().length===0){setHint("戰鬥勝利！點刷新可再測");S.playerTurn=false;renderAll();return;}
  renderAll();
}

function resolveCard(c,targetId){
  const t=enemyById(targetId);
  if(c.damage&&t) t.hp=Math.max(0,t.hp-c.damage);
  if(c.selfDamage) S.player.hp=Math.max(0,S.player.hp-c.selfDamage);
  if(c.heal) S.player.hp=Math.min(S.player.maxHp,S.player.hp+c.heal);
  if(c.energyGain) S.player.energy=Math.min(99,S.player.energy+c.energyGain);
  if(c.draw) drawCards(c.draw);
}

function enemyTurn(){
  for(const e of aliveEnemies()){
    S.player.hp=Math.max(0,S.player.hp-e.intent);
    e.idx=(e.idx+1)%e.pattern.length;
    e.intent=e.pattern[e.idx];
  }
}

function nextTurn(){
  if(!S.playerTurn)return;
  S.playerTurn=false;
  S.discard.push(...S.hand); S.hand=[]; S.selectedCard=null; S.selectedEnemy=null;
  enemyTurn();
  if(S.player.hp<=0){setHint("你倒下了，請刷新重測");renderAll();return;}
  S.turn+=1;
  S.player.energy=S.player.maxEnergy;
  S.playerTurn=true;
  drawCards(5-S.hand.length);
  setHint("你的回合：點卡牌出牌");
  renderAll();
}

document.getElementById("endBtn").onclick=nextTurn;
init();
</script>
</body>
</html>
