<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>小隊指揮 Demo（分支1）</title>
  <style>
    :root {
      --bg: #0f121b;
      --panel: #1a2031;
      --panel2: #242d45;
      --line: #354264;
      --text: #ecf1ff;
      --muted: #9aa8d1;
      --accent: #8ea8ff;
      --enemy: #ff9b7a;
      --ally: #8fd1ff;
      --warn: #ffd285;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
    body {
      margin: 0; min-height: 100vh;
      background: radial-gradient(circle at 50% -20%, #283458 0%, var(--bg) 58%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", sans-serif;
      padding: 10px 10px 16px;
    }
    .app { max-width: 430px; margin: 0 auto; display: flex; flex-direction: column; gap: 10px; }
    .title { font-size: 18px; font-weight: 800; }
    .sub { color: var(--muted); font-size: 12px; margin-top: 2px; line-height: 1.4; }

    .panel {
      background: linear-gradient(180deg, var(--panel2), var(--panel));
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.32);
    }

    .top-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .hp-pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 10px; border-radius: 999px;
      background: #1b2440; border: 1px solid #4e5fa0;
      font-size: 12px; color: #d9e4ff; font-weight: 700;
    }
    .hp-pill.enemy { border-color: #b06b52; color: #ffd1bf; }

    /* ===== 敌人区 ===== */
    .enemy-area {
      display: flex; gap: 8px; justify-content: center;
      padding: 8px; border-radius: 12px;
      background: linear-gradient(180deg, #2a1e1e, #1a1414);
      border: 1px solid #5a3a36;
      min-height: 130px;
    }
    .enemy {
      flex: 1; max-width: 120px; min-height: 118px;
      border-radius: 10px; padding: 8px;
      background: rgba(0,0,0,0.28);
      border: 1px solid rgba(255,255,255,0.1);
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      position: relative;
      transition: border-color 120ms, transform 120ms, box-shadow 120ms;
      cursor: pointer;
    }
    .enemy.drop-ready { border-color: #ffb97a; box-shadow: 0 0 0 2px rgba(255,185,122,0.3); transform: scale(1.02); }
    .enemy .face { font-size: 36px; line-height: 1; }
    .enemy .name { font-size: 11px; color: #ffc8b4; font-weight: 700; }
    .enemy .hpbar {
      width: 100%; height: 6px; border-radius: 999px;
      background: rgba(0,0,0,0.5); overflow: hidden; margin-top: 2px;
    }
    .enemy .hpbar > i {
      display: block; height: 100%; width: 0;
      background: linear-gradient(90deg, #f97878, #ffb089); border-radius: 999px;
      transition: width 180ms;
    }
    .enemy .hp-num { font-size: 10px; color: #ffd6c4; }
    .enemy .intent {
      margin-top: 3px; font-size: 10px;
      background: rgba(0,0,0,0.45); border: 1px solid #8a5848;
      border-radius: 999px; padding: 2px 8px;
      color: #ffe2c9; white-space: nowrap;
    }
    .enemy.dead { opacity: 0.25; filter: grayscale(1); pointer-events: none; }

    /* ===== 我方场面 ===== */
    .field {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
      padding: 8px; border-radius: 12px;
      background: linear-gradient(180deg, #182235, #10172a);
      border: 1px solid #35527a;
      min-height: 140px;
    }
    .slot {
      position: relative; min-height: 124px;
      border-radius: 10px; border: 1px dashed rgba(255,255,255,0.18);
      background: rgba(10,16,30,0.55);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 6px;
      transition: border-color 120ms, box-shadow 120ms, transform 120ms;
      cursor: pointer;
    }
    .slot.drop-ready { border-color: #f7d39b; border-style: solid; box-shadow: 0 0 0 2px rgba(247,211,155,0.3); transform: scale(1.02); }
    .slot.empty .placeholder {
      color: rgba(255,255,255,0.32); font-size: 11px;
    }
    .ally {
      width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
    }
    .ally .face { font-size: 32px; line-height: 1; }
    .ally .name { font-size: 11px; color: #b6d7ff; font-weight: 800; }
    .ally .stats {
      display: flex; gap: 4px; flex-wrap: wrap; justify-content: center;
    }
    .ally .chip {
      font-size: 10px; padding: 2px 6px; border-radius: 999px;
      background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.2);
    }
    .ally .chip.atk { color: #ffd08a; border-color: rgba(255,208,138,0.4); }
    .ally .chip.hp { color: #ffbebe; border-color: rgba(255,190,190,0.4); }
    .ally .chip.blk { color: #9cd0ff; border-color: rgba(156,208,255,0.4); }
    .ally .chip.buff { color: #e6c2ff; border-color: rgba(230,194,255,0.4); }
    .ally .hpbar {
      width: 100%; height: 4px; border-radius: 999px;
      background: rgba(0,0,0,0.5); overflow: hidden;
    }
    .ally .hpbar > i {
      display: block; height: 100%; width: 0;
      background: linear-gradient(90deg, #7fbfff, #b9e0ff);
      border-radius: 999px; transition: width 180ms;
    }
    .ally.just-acted { animation: pulse 300ms ease; }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.08); filter: brightness(1.2); }
      100% { transform: scale(1); }
    }

    /* ===== 中间提示条 ===== */
    .mid-hint {
      text-align: center; font-size: 11px;
      color: var(--muted); padding: 4px 0;
    }

    /* ===== 资源 ===== */
    .resource {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-top: 8px;
    }
    .resource .item {
      border-radius: 10px; padding: 6px; border: 1px solid #38466d;
      background: #12192b; text-align: center; font-size: 10px; line-height: 1.3;
    }
    .item strong { font-size: 15px; display: block; margin-top: 1px; color: #f1f4ff; }

    /* ===== 拖拽提示 ===== */
    .drop-hint {
      margin-top: 8px; border-radius: 10px; padding: 8px;
      border: 1px dashed #5468a0; color: #c8d4ff; font-size: 12px;
      text-align: center; background: rgba(30,40,68,0.5); min-height: 36px;
      display: flex; align-items: center; justify-content: center;
    }
    .drop-hint.hot { border-color: #f7d39b; color: #ffe6bd; background: rgba(88,58,38,0.38); }

    /* ===== 手牌 ===== */
    .hand-title {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 6px; font-size: 12px; color: var(--muted);
    }
    .hand-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 2px; }
    .hand-scroll::-webkit-scrollbar { height: 6px; }
    .hand-scroll::-webkit-scrollbar-thumb { background: #3a4771; border-radius: 999px; }
    .card {
      flex: 0 0 130px; min-height: 160px;
      border-radius: 12px; padding: 9px;
      position: relative; touch-action: none;
      text-align: left; box-shadow: 0 6px 14px rgba(0,0,0,0.24);
      transition: transform 120ms, opacity 120ms;
    }
    .card.type-char {
      background: linear-gradient(180deg, #2c4a63, #162938);
      border: 1px solid #6ca2c8;
    }
    .card.type-skill {
      background: linear-gradient(180deg, #3a2c5a, #1e1535);
      border: 1px solid #8a6bc4;
    }
    .card.type-tech {
      background: linear-gradient(180deg, #4a3320, #251a10);
      border: 1px solid #c59063;
    }
    .card.disabled { opacity: 0.45; filter: grayscale(0.3); }
    .card.dragging { opacity: 0.35; }
    .card .cost {
      position: absolute; right: 6px; top: 6px;
      width: 22px; height: 22px; border-radius: 999px;
      background: #ffd67c; color: #3e2d00;
      display: grid; place-items: center; font-size: 11px; font-weight: 900;
      border: 1px solid #ffe9b8;
    }
    .card .tag {
      display: inline-block; font-size: 9px; font-weight: 800;
      padding: 2px 6px; border-radius: 999px; margin-bottom: 5px;
      background: rgba(0,0,0,0.35); color: #e6eeff;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .card .name { font-size: 14px; font-weight: 800; margin-right: 26px; }
    .card .desc { margin-top: 5px; font-size: 11px; line-height: 1.4; color: #d4ddff; }
    .card .stats-line {
      display: flex; gap: 6px; margin-top: 5px;
      font-size: 10px; color: #ffd6a8;
    }
    .card .hint {
      margin-top: 6px; padding-top: 5px; font-size: 10px;
      color: #a8b8e0; border-top: 1px dashed rgba(255,255,255,0.15);
    }

    .btns { display: flex; gap: 8px; margin-top: 10px; }
    .btn {
      flex: 1; border-radius: 10px; border: 1px solid #4e5f96;
      background: #1f2a4a; color: #e8edff; padding: 9px;
      font-weight: 700; font-size: 13px;
    }
    .btn.primary { background: #30458f; border-color: #6d86e0; }

    .log {
      border: 1px solid #36415f; background: #111726;
      border-radius: 10px; padding: 7px;
      max-height: 110px; overflow: auto;
      font-size: 11px; line-height: 1.5; color: #dbe4ff;
    }
    .win { color: #96ffc2; font-weight: 700; }
    .lose { color: #ff9d9d; font-weight: 700; }

    .drag-ghost {
      position: fixed; z-index: 999;
      width: 130px; min-height: 160px;
      border-radius: 12px; padding: 9px;
      pointer-events: none; box-shadow: 0 12px 28px rgba(0,0,0,0.4);
      transform: translate(-50%, -50%) scale(1.04);
      border: 1px solid #ffe2ad;
      color: #fff6e3;
    }

    /* 飘字 */
    .float-txt {
      position: fixed; z-index: 50;
      font-weight: 900; font-size: 20px;
      pointer-events: none;
      text-shadow: 0 2px 6px rgba(0,0,0,0.6);
      animation: floatUp 900ms ease forwards;
    }
    @keyframes floatUp {
      0% { transform: translate(-50%, 0); opacity: 1; }
      100% { transform: translate(-50%, -40px); opacity: 0; }
    }
    .dmg { color: #ff9292; }
    .heal { color: #9bffb8; }
    .buf { color: #e1b6ff; }
    .blk { color: #9cd0ff; }
  </style>
</head>
<body>
  <div class="app">
    <div>
      <div class="title">小隊指揮 Demo（分支1）</div>
      <div class="sub">你是指揮官，召喚角色上場，用能力牌指定他們戰鬥</div>
    </div>

    <div class="panel">
      <div class="top-row">
        <span class="hp-pill">❤ 本體 <strong id="selfHp">30</strong> / <span id="selfMax">30</span></span>
        <span class="hp-pill">回合 <strong id="turnNum">1</strong></span>
        <span class="hp-pill enemy">⚔ 敵方 <strong id="enemyCount">1</strong></span>
      </div>

      <div style="height: 8px"></div>

      <div class="enemy-area" id="enemyArea"></div>

      <div class="mid-hint" id="midHint">拖 角色牌 → 空場地格｜拖 能力牌 → 角色（支援）或敵人（攻擊）</div>

      <div class="field" id="field"></div>

      <div class="resource">
        <div class="item">能量<strong id="energyVal">3</strong></div>
        <div class="item">手牌<strong id="handCount">0</strong></div>
        <div class="item">牌庫<strong id="deckCount">0</strong></div>
        <div class="item">場上<strong id="allyCount">0</strong></div>
      </div>

      <div class="drop-hint" id="dropHint">拖牌到對應目標即可出牌</div>
    </div>

    <div class="panel">
      <div class="hand-title">
        <span>手牌</span>
        <span id="handTips">拖到目標出牌</span>
      </div>
      <div class="hand-scroll" id="hand"></div>
      <div class="btns">
        <button class="btn primary" id="endTurnBtn">結束回合</button>
        <button class="btn" id="restartBtn">重開本局</button>
      </div>
    </div>

    <div class="panel">
      <div class="log" id="log"></div>
    </div>
  </div>

  <script>
    // ======= 角色模板（上场后的数值） =======
    const CHARS = {
      knight: { name: "鐵衛騎士", face: "🛡️", hp: 14, atk: 3, block: 2, tag: "坦克", desc: "上場時給自己 +3 護甲。" },
      slasher: { name: "劍客阿九", face: "⚔️", hp: 9, atk: 5, block: 0, tag: "輸出", desc: "攻擊傷害 +5。" },
      mage: { name: "術士小柔", face: "🔮", hp: 7, atk: 3, block: 0, tag: "法系", desc: "對她使用法術時效果 +2。" }
    };

    // ======= 牌库 =======
    // type: char | skill | tech
    // targetType: slot(空格) | ally | enemy | self | none
    const baseDeck = [
      { id: "char_knight", type: "char", name: "鐵衛騎士", tag: "角色", cost: 2, target: "slot", tpl: "knight",
        text: "召喚鐵衛騎士（14HP / 3ATK），上場獲得 +3 護甲。" },
      { id: "char_slasher", type: "char", name: "劍客阿九", tag: "角色", cost: 1, target: "slot", tpl: "slasher",
        text: "召喚劍客阿九（9HP / 5ATK）。" },
      { id: "char_mage", type: "char", name: "術士小柔", tag: "角色", cost: 1, target: "slot", tpl: "mage",
        text: "召喚術士小柔（7HP / 3ATK）。被法術加成。" },

      { id: "skill_strike", type: "skill", name: "揮砍", tag: "行動", cost: 1, target: "ally",
        text: "讓一名我方角色攻擊一次（傷害=該角色ATK）。", action: "attack" },
      { id: "skill_strike2", type: "skill", name: "揮砍", tag: "行動", cost: 1, target: "ally",
        text: "讓一名我方角色攻擊一次（傷害=該角色ATK）。", action: "attack" },
      { id: "skill_guard", type: "skill", name: "嚴防", tag: "防禦", cost: 1, target: "ally",
        text: "目標角色獲得 4 護甲。", action: "block4" },
      { id: "skill_rage", type: "skill", name: "怒意", tag: "強化", cost: 1, target: "ally",
        text: "目標角色 +2 ATK，並立即攻擊一次。", action: "rageAttack" },
      { id: "skill_blast", type: "skill", name: "火球術", tag: "法術", cost: 2, target: "enemy",
        text: "對敵人造成 8 傷害。若由場上術士協助 +3。", action: "spellBlast" },
      { id: "skill_heal", type: "skill", name: "救治", tag: "治療", cost: 1, target: "ally",
        text: "回復目標 6 HP。", action: "heal6" },

      { id: "tech_rush", type: "tech", name: "急行令", tag: "戰術", cost: 0, target: "none",
        text: "所有我方角色本回合可立即各攻擊一次。", action: "rushAll" },
      { id: "tech_shield", type: "tech", name: "堅陣", tag: "戰術", cost: 1, target: "none",
        text: "所有我方角色獲得 +3 護甲。", action: "shieldAll" }
    ];

    // ======= 敌人 =======
    function makeEnemy() {
      return {
        uid: Math.random().toString(36).slice(2),
        name: "斷罪騎士",
        face: "👹",
        hp: 32, maxHp: 32, block: 0,
        dead: false,
        intent: null
      };
    }

    let state;
    const drag = {
      active: false, uid: null, pointerId: null,
      cardEl: null, ghostEl: null, overTarget: null, overKey: null,
      startX: 0, startY: 0, moved: false
    };

    function newGame() {
      state = {
        self: { hp: 30, maxHp: 30 },
        field: [null, null, null], // 我方场面位
        enemies: [makeEnemy()],
        deck: shuffle(baseDeck.map(c => ({ ...c, uid: Math.random().toString(36).slice(2) }))),
        discard: [],
        hand: [],
        energy: 3,
        turn: 1,
        ended: false
      };
      state.enemies.forEach(pickEnemyIntent);
      draw(5);
      logClear();
      log("戰鬥開始：先召喚角色上場，再用能力牌指定他們行動。");
      render();
    }

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }
    function draw(n) {
      for (let i = 0; i < n; i++) {
        if (state.deck.length === 0) {
          state.deck = shuffle(state.discard);
          state.discard = [];
        }
        if (state.deck.length === 0) break;
        state.hand.push(state.deck.pop());
      }
    }

    function pickEnemyIntent(e) {
      const r = Math.random();
      const targets = state.field.filter(a => a && !a.dead);
      if (r < 0.55) e.intent = { type: "attack", value: 7, text: `攻擊 7` };
      else if (r < 0.8) e.intent = { type: "guard", value: 6, text: `護甲 6` };
      else e.intent = { type: "aoe", value: 3, text: `橫掃 3（全體）` };

      if (targets.length === 0 && e.intent.type === "attack") {
        e.intent = { type: "direct", value: 7, text: `直擊本體 7` };
      }
    }

    // ======= 出牌逻辑 =======
    function canPlay(c) {
      if (!c || state.ended) return false;
      if (c.cost > state.energy) return false;
      if (c.type === "char") {
        return state.field.some(s => s === null);
      }
      if (c.target === "ally") {
        return state.field.some(s => s && !s.dead);
      }
      if (c.target === "enemy") {
        return state.enemies.some(e => !e.dead);
      }
      return true;
    }

    function tryPlay(uid, target, key) {
      const idx = state.hand.findIndex(c => c.uid === uid);
      if (idx < 0) return;
      const card = state.hand[idx];
      if (!canPlay(card)) return;

      if (card.type === "char") {
        if (target !== "slot") return;
        const slotIdx = Number(key);
        if (state.field[slotIdx]) return;
        const tpl = CHARS[card.tpl];
        const ally = {
          uid: Math.random().toString(36).slice(2),
          tpl: card.tpl,
          name: tpl.name, face: tpl.face, tag: tpl.tag,
          hp: tpl.hp, maxHp: tpl.hp, atk: tpl.atk, block: tpl.block,
          buff: 0, dead: false
        };
        if (card.tpl === "knight") ally.block += 3;
        state.field[slotIdx] = ally;
        log(`召喚了 ${ally.name}。`);
        flash(getSlotEl(slotIdx));
      } else if (card.target === "ally") {
        if (target !== "ally") return;
        const ally = findAlly(key);
        if (!ally || ally.dead) return;
        applySkill(card, { ally });
      } else if (card.target === "enemy") {
        if (target !== "enemy") return;
        const enemy = findEnemy(key);
        if (!enemy || enemy.dead) return;
        applySkill(card, { enemy });
      } else {
        applySkill(card, {});
      }

      state.energy -= card.cost;
      state.discard.push(card);
      state.hand.splice(idx, 1);

      cleanupDead();
      checkEnd();
      render();
    }

    function applySkill(card, ctx) {
      switch (card.action) {
        case "attack": {
          const a = ctx.ally;
          const dmg = a.atk + (a.buff || 0);
          // 自动选第一个活敌人作为目标
          const target = state.enemies.find(e => !e.dead);
          if (!target) return;
          dealEnemyDmg(target, dmg);
          log(`${a.name} 揮砍，造成 ${dmg} 傷害。`);
          flash(getAllyElByUid(a.uid));
          break;
        }
        case "rageAttack": {
          const a = ctx.ally;
          a.buff = (a.buff || 0) + 2;
          const dmg = a.atk + a.buff;
          const target = state.enemies.find(e => !e.dead);
          floatOn(getAllyElByUid(a.uid), "+2 ATK", "buf");
          log(`${a.name} 進入怒意（+2 ATK）。`);
          if (target) {
            dealEnemyDmg(target, dmg);
            log(`${a.name} 怒擊，造成 ${dmg} 傷害。`);
          }
          flash(getAllyElByUid(a.uid));
          break;
        }
        case "block4": {
          const a = ctx.ally;
          a.block += 4;
          floatOn(getAllyElByUid(a.uid), "+4 護甲", "blk");
          log(`${a.name} 嚴防（+4 護甲）。`);
          break;
        }
        case "heal6": {
          const a = ctx.ally;
          const h = Math.min(6, a.maxHp - a.hp);
          a.hp += h;
          floatOn(getAllyElByUid(a.uid), `+${h}`, "heal");
          log(`${a.name} 回復 ${h} HP。`);
          break;
        }
        case "spellBlast": {
          const e = ctx.enemy;
          let dmg = 8;
          const hasMage = state.field.some(s => s && !s.dead && s.tpl === "mage");
          if (hasMage) dmg += 3;
          dealEnemyDmg(e, dmg);
          log(`火球術造成 ${dmg} 傷害${hasMage ? "（術士協助 +3）" : ""}。`);
          break;
        }
        case "rushAll": {
          state.field.forEach(a => {
            if (!a || a.dead) return;
            const dmg = a.atk + (a.buff || 0);
            const target = state.enemies.find(e => !e.dead);
            if (target) {
              dealEnemyDmg(target, dmg);
              log(`${a.name} 攻擊，造成 ${dmg} 傷害。`);
            }
            flash(getAllyElByUid(a.uid));
          });
          break;
        }
        case "shieldAll": {
          state.field.forEach(a => {
            if (!a || a.dead) return;
            a.block += 3;
            floatOn(getAllyElByUid(a.uid), "+3 護甲", "blk");
          });
          log(`堅陣：全體 +3 護甲。`);
          break;
        }
      }
    }

    function dealEnemyDmg(e, n) {
      const blocked = Math.min(e.block, n);
      const dealt = Math.max(0, n - blocked);
      e.block -= blocked;
      e.hp -= dealt;
      if (e.hp < 0) e.hp = 0;
      floatOn(getEnemyElByUid(e.uid), `-${dealt}`, "dmg");
      if (e.hp === 0) e.dead = true;
    }

    function dealAllyDmg(a, n) {
      const blocked = Math.min(a.block, n);
      const dealt = Math.max(0, n - blocked);
      a.block -= blocked;
      a.hp -= dealt;
      floatOn(getAllyElByUid(a.uid), `-${dealt}`, "dmg");
      if (a.hp <= 0) { a.hp = 0; a.dead = true; log(`${a.name} 陣亡！`); }
    }

    function dealSelfDmg(n) {
      state.self.hp -= n;
      const el = document.getElementById("selfHp");
      if (el && el.parentElement) floatOn(el.parentElement, `-${n}`, "dmg");
      if (state.self.hp < 0) state.self.hp = 0;
    }

    function cleanupDead() {
      state.field = state.field.map(a => (a && a.dead) ? null : a);
    }

    // ======= 回合结束 =======
    function endTurn() {
      if (state.ended) return;

      // 弃牌
      state.discard.push(...state.hand);
      state.hand = [];

      // 敌人行动
      state.enemies.forEach(e => {
        if (e.dead) return;
        const it = e.intent;
        if (!it) return;
        if (it.type === "attack") {
          // 优先打有角色的场面
          const targets = state.field.filter(a => a && !a.dead);
          if (targets.length === 0) {
            dealSelfDmg(it.value);
            log(`${e.name} 直擊本體 ${it.value}。`);
          } else {
            // 攻击 HP 最高的（像嘲讽）
            const t = targets.sort((a, b) => b.hp - a.hp)[0];
            dealAllyDmg(t, it.value);
            log(`${e.name} 攻擊 ${t.name}（${it.value}）。`);
          }
        } else if (it.type === "direct") {
          dealSelfDmg(it.value);
          log(`${e.name} 直擊本體 ${it.value}。`);
        } else if (it.type === "guard") {
          e.block += it.value;
          log(`${e.name} 獲得 ${it.value} 護甲。`);
        } else if (it.type === "aoe") {
          state.field.forEach(a => {
            if (!a || a.dead) return;
            dealAllyDmg(a, it.value);
          });
          log(`${e.name} 橫掃全體 ${it.value}。`);
        }
      });

      cleanupDead();
      checkEnd();
      if (state.ended) return render();

      // 新回合
      state.turn += 1;
      state.energy = 3;
      state.field.forEach(a => { if (a) a.block = 0; }); // 护甲重置
      state.enemies.forEach(e => { if (!e.dead) pickEnemyIntent(e); });
      draw(5);
      render();
    }

    function checkEnd() {
      if (state.enemies.every(e => e.dead)) {
        state.ended = true;
        log("你擊敗了所有敵人！", "win");
      } else if (state.self.hp <= 0) {
        state.ended = true;
        log("你被擊敗。", "lose");
      }
    }

    // ======= 渲染 =======
    function findAlly(uid) { return state.field.find(a => a && a.uid === uid); }
    function findEnemy(uid) { return state.enemies.find(e => e.uid === uid); }
    function getSlotEl(i) { return document.querySelectorAll(".slot")[i]; }
    function getAllyElByUid(uid) {
      const slots = document.querySelectorAll(".slot");
      for (const s of slots) if (s.dataset.uid === uid) return s;
      return null;
    }
    function getEnemyElByUid(uid) {
      return document.querySelector(`.enemy[data-uid="${uid}"]`);
    }

    function render() {
      document.getElementById("selfHp").textContent = state.self.hp;
      document.getElementById("selfMax").textContent = state.self.maxHp;
      document.getElementById("turnNum").textContent = state.turn;
      document.getElementById("enemyCount").textContent = state.enemies.filter(e => !e.dead).length;
      document.getElementById("energyVal").textContent = state.energy;
      document.getElementById("handCount").textContent = state.hand.length;
      document.getElementById("deckCount").textContent = state.deck.length;
      document.getElementById("allyCount").textContent = state.field.filter(a => a).length;

      renderEnemies();
      renderField();
      renderHand();

      document.getElementById("endTurnBtn").disabled = state.ended;
      document.getElementById("endTurnBtn").textContent = state.ended ? "戰鬥已結束" : "結束回合";
      updateDropHint(null);
      clearHot();
    }

    function renderEnemies() {
      const area = document.getElementById("enemyArea");
      area.innerHTML = "";
      state.enemies.forEach(e => {
        const el = document.createElement("div");
        el.className = `enemy ${e.dead ? "dead" : ""}`;
        el.dataset.uid = e.uid;
        el.innerHTML = `
          <div class="face">${e.face}</div>
          <div class="name">${e.name}</div>
          <div class="hpbar"><i style="width:${(e.hp / e.maxHp * 100)}%"></i></div>
          <div class="hp-num">HP ${e.hp}/${e.maxHp}${e.block > 0 ? ` · 甲 ${e.block}` : ""}</div>
          <div class="intent">${e.dead ? "已擊倒" : (e.intent ? e.intent.text : "")}</div>
        `;
        area.appendChild(el);
      });
    }

    function renderField() {
      const f = document.getElementById("field");
      f.innerHTML = "";
      state.field.forEach((a, i) => {
        const slot = document.createElement("div");
        slot.className = `slot ${a ? "" : "empty"}`;
        slot.dataset.slot = i;
        if (a) slot.dataset.uid = a.uid;

        if (a) {
          slot.innerHTML = `
            <div class="ally">
              <div class="face">${a.face}</div>
              <div class="name">${a.name}</div>
              <div class="hpbar"><i style="width:${(a.hp / a.maxHp * 100)}%"></i></div>
              <div class="stats">
                <span class="chip hp">${a.hp}/${a.maxHp}</span>
                <span class="chip atk">⚔${a.atk + (a.buff || 0)}</span>
                ${a.block > 0 ? `<span class="chip blk">🛡${a.block}</span>` : ""}
                ${a.buff > 0 ? `<span class="chip buff">+${a.buff}</span>` : ""}
              </div>
            </div>
          `;
        } else {
          slot.innerHTML = `<div class="placeholder">空位 ${i + 1}</div>`;
        }
        f.appendChild(slot);
      });
    }

    function renderHand() {
      const handEl = document.getElementById("hand");
      handEl.innerHTML = "";

      state.hand.forEach(c => {
        const card = document.createElement("button");
        const ok = canPlay(c);
        card.className = `card type-${c.type} ${ok ? "" : "disabled"}`;
        card.dataset.uid = c.uid;

        let hintText = "";
        if (c.type === "char") hintText = ok ? "拖到空位召喚" : "無空位 / 能量不足";
        else if (c.target === "ally") hintText = ok ? "拖到我方角色" : "場上無角色 / 能量不足";
        else if (c.target === "enemy") hintText = ok ? "拖到敵人" : "能量不足";
        else hintText = ok ? "拖到場地發動" : "能量不足";

        let statsLine = "";
        if (c.type === "char") {
          const tpl = CHARS[c.tpl];
          statsLine = `<div class="stats-line">❤${tpl.hp}  ⚔${tpl.atk}${tpl.block ? `  🛡${tpl.block}` : ""}</div>`;
        }

        card.innerHTML = `
          <div class="cost">${c.cost}</div>
          <div class="tag">${c.tag}</div>
          <div class="name">${c.name}</div>
          ${statsLine}
          <div class="desc">${c.text}</div>
          <div class="hint">${hintText}</div>
        `;

        card.addEventListener("pointerdown", ev => startDrag(ev, c.uid, card));
        handEl.appendChild(card);
      });
    }

    // ======= 拖拽 =======
    function startDrag(e, uid, cardEl) {
      const card = state.hand.find(c => c.uid === uid);
      if (!canPlay(card)) return;
      drag.active = true;
      drag.uid = uid;
      drag.pointerId = e.pointerId;
      drag.cardEl = cardEl;
      drag.overTarget = null; drag.overKey = null;
      drag.startX = e.clientX; drag.startY = e.clientY;
      drag.moved = false;
      document.addEventListener("pointermove", onDragMove);
      document.addEventListener("pointerup", onDragEnd);
      document.addEventListener("pointercancel", onDragEnd);
    }
    function onDragMove(e) {
      if (!drag.active || e.pointerId !== drag.pointerId) return;
      const dx = e.clientX - drag.startX, dy = e.clientY - drag.startY;
      if (!drag.moved && Math.hypot(dx, dy) > 8) {
        drag.moved = true;
        drag.cardEl.classList.add("dragging");
        const ghost = document.createElement("div");
        ghost.className = "drag-ghost " + drag.cardEl.className;
        ghost.innerHTML = drag.cardEl.innerHTML;
        document.body.appendChild(ghost);
        drag.ghostEl = ghost;
      }
      if (drag.moved) {
        drag.ghostEl.style.left = `${e.clientX}px`;
        drag.ghostEl.style.top = `${e.clientY}px`;
        refreshOver(e.clientX, e.clientY);
      }
    }
    function onDragEnd(e) {
      if (!drag.active || e.pointerId !== drag.pointerId) return;
      const t = drag.overTarget, k = drag.overKey, uid = drag.uid;
      const moved = drag.moved;
      cleanupDrag();
      if (!moved) return;

      const card = state.hand.find(c => c.uid === uid);
      if (!card) return;
      if (card.type === "char" && t === "slot") tryPlay(uid, "slot", k);
      else if (card.target === "ally" && t === "ally") tryPlay(uid, "ally", k);
      else if (card.target === "enemy" && t === "enemy") tryPlay(uid, "enemy", k);
      else if (card.target === "none") tryPlay(uid, "none");
    }
    function refreshOver(x, y) {
      const card = state.hand.find(c => c.uid === drag.uid);
      if (!card) return;
      let over = null, key = null;

      if (card.type === "char") {
        document.querySelectorAll(".slot").forEach((s, i) => {
          const r = s.getBoundingClientRect();
          if (x >= r.left && x <= r.right && y >= r.top && y <= r.bottom && !state.field[i]) {
            over = "slot"; key = i;
          }
        });
      } else if (card.target === "ally") {
        document.querySelectorAll(".slot").forEach(s => {
          if (!s.dataset.uid) return;
          const r = s.getBoundingClientRect();
          if (x >= r.left && x <= r.right && y >= r.top && y <= r.bottom) {
            over = "ally"; key = s.dataset.uid;
          }
        });
      } else if (card.target === "enemy") {
        document.querySelectorAll(".enemy").forEach(s => {
          const r = s.getBoundingClientRect();
          const e = state.enemies.find(x => x.uid === s.dataset.uid);
          if (x >= r.left && x <= r.right && y >= r.top && y <= r.bottom && e && !e.dead) {
            over = "enemy"; key = s.dataset.uid;
          }
        });
      } else if (card.target === "none") {
        over = "none"; key = null;
      }

      drag.overTarget = over; drag.overKey = key;
      updateHot(over, key);
      updateDropHint(card, over);
    }
    function updateHot(over, key) {
      clearHot();
      if (over === "slot") {
        const el = document.querySelectorAll(".slot")[key];
        if (el) el.classList.add("drop-ready");
      } else if (over === "ally") {
        const el = document.querySelector(`.slot[data-uid="${key}"]`);
        if (el) el.classList.add("drop-ready");
      } else if (over === "enemy") {
        const el = document.querySelector(`.enemy[data-uid="${key}"]`);
        if (el) el.classList.add("drop-ready");
      }
    }
    function clearHot() {
      document.querySelectorAll(".slot.drop-ready").forEach(s => s.classList.remove("drop-ready"));
      document.querySelectorAll(".enemy.drop-ready").forEach(s => s.classList.remove("drop-ready"));
    }
    function updateDropHint(card, over) {
      const el = document.getElementById("dropHint");
      el.classList.remove("hot");
      if (!card) {
        el.textContent = "拖牌到對應目標即可出牌";
        return;
      }
      if (!drag.moved) {
        el.textContent = "拖動卡牌到目標";
        return;
      }
      if (over) {
        if (over === "slot") el.textContent = "放開：召喚角色到此位";
        else if (over === "ally") el.textContent = "放開：對我方角色發動";
        else if (over === "enemy") el.textContent = "放開：攻擊敵人";
        else el.textContent = "放開：發動戰術";
        el.classList.add("hot");
      } else {
        if (card.type === "char") el.textContent = "請拖到空位召喚";
        else if (card.target === "ally") el.textContent = "請拖到我方角色";
        else if (card.target === "enemy") el.textContent = "請拖到敵人";
        else el.textContent = "請拖到場地釋放";
      }
    }
    function cleanupDrag() {
      if (drag.cardEl) drag.cardEl.classList.remove("dragging");
      if (drag.ghostEl && drag.ghostEl.parentNode) drag.ghostEl.parentNode.removeChild(drag.ghostEl);
      drag.active = false; drag.uid = null; drag.pointerId = null;
      drag.cardEl = null; drag.ghostEl = null;
      drag.overTarget = null; drag.overKey = null; drag.moved = false;
      clearHot(); updateDropHint(null);
      document.removeEventListener("pointermove", onDragMove);
      document.removeEventListener("pointerup", onDragEnd);
      document.removeEventListener("pointercancel", onDragEnd);
    }

    // ======= 特效 =======
    function floatOn(el, txt, cls) {
      if (!el) return;
      const r = el.getBoundingClientRect();
      const f = document.createElement("div");
      f.className = `float-txt ${cls}`;
      f.textContent = txt;
      f.style.left = `${r.left + r.width / 2}px`;
      f.style.top = `${r.top + 10}px`;
      document.body.appendChild(f);
      setTimeout(() => f.remove(), 900);
    }
    function flash(el) {
      if (!el) return;
      el.classList.remove("just-acted");
      void el.offsetWidth;
      el.classList.add("just-acted");
    }

    // ======= 日志 =======
    function log(text, cls = "") {
      const el = document.getElementById("log");
      const line = document.createElement("div");
      if (cls) line.className = cls;
      line.textContent = `• ${text}`;
      el.prepend(line);
    }
    function logClear() { document.getElementById("log").innerHTML = ""; }

    document.getElementById("endTurnBtn").addEventListener("click", endTurn);
    document.getElementById("restartBtn").addEventListener("click", newGame);

    newGame();
  </script>
</body>
</html>
